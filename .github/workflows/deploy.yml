name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同じブランチへの古い実行をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: 型チェック・ビルド検証
  # ─────────────────────────────────────────────────────────
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # Job 2: VPS へ Docker Compose デプロイ
  # PR では実行しない（main push のみ）
  # ─────────────────────────────────────────────────────────
  deploy-vps:
    name: Deploy to VPS (Docker Compose)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # GitHub Environments を使って保護ルールを設定可能
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || '22' }}
          # タイムアウト: ビルド込みで 5 分
          command_timeout: 5m
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH || '/opt/kabu-line-bot' }}"
            echo "=== Deploy to $DEPLOY_PATH ==="

            # リポジトリが無ければ clone、あれば pull
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone https://github.com/${{ github.repository }} "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            echo "--- git pull ---"
            git fetch origin main
            git reset --hard origin/main

            echo "--- .env 確認 ---"
            if [ ! -f .env ]; then
              echo "ERROR: .env が存在しません。VPS 上で手動作成してください。"
              exit 1
            fi

            echo "--- Docker Compose ビルド & 再起動 ---"
            docker compose build app
            docker compose up -d --remove-orphans

            echo "--- ヘルスチェック待機（最大 60 秒）---"
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(docker compose ps app --format json | python3 -c \
                "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ アプリ起動確認"
                break
              fi
              echo "  待機中... ($((i*5))s)"
            done

            echo "--- デプロイ完了 ---"
            docker compose ps

  # ─────────────────────────────────────────────────────────
  # Job 3: Railway / Render デプロイ（代替）
  # VPS を使わない場合はこちらを有効化し、deploy-vps を無効化する
  #
  # Railway: リポジトリ連携で main push 時に自動デプロイ
  #   → このジョブは不要（Railway 側で設定する）
  #
  # Render: render.yaml を置けば自動デプロイ
  #   → このジョブは不要（Render 側で設定する）
  #
  # 手動トリガーで Render デプロイフックを叩く例:
  # ─────────────────────────────────────────────────────────
  # deploy-render:
  #   name: Deploy to Render
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   steps:
  #     - name: Trigger Render Deploy Hook
  #       run: |
  #         curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ─────────────────────────────────────────────────────────
  # Job 4: Slack / LINE 通知（オプション）
  # ─────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, deploy-vps]
    if: failure()

    steps:
      - name: Notify LINE on deploy failure
        # LINE Notify（廃止済み）の代わりに Messaging API を使う場合はここに記述
        # 簡易的には curl で自前エンドポイントを叩く
        run: |
          echo "デプロイ失敗: ${{ github.repository }} @ ${{ github.sha }}"
          echo "詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # 必要に応じて通知ロジックを追加
