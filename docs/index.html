<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>株クラ朝刊</title>
  <style>
    :root {
      --paper: #f5efe2;
      --sheet: #fffdf8;
      --ink: #171b1f;
      --muted: #5b646d;
      --line: rgba(23, 27, 31, 0.14);
      --line-strong: rgba(23, 27, 31, 0.32);
      --accent: #8a1f1f;
      --accent-soft: rgba(138, 31, 31, 0.08);
      --navy: #193652;
      --navy-soft: rgba(25, 54, 82, 0.08);
      --green: #315e50;
      --green-soft: rgba(49, 94, 80, 0.08);
      --shadow: 0 18px 48px rgba(57, 43, 24, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0)),
        var(--paper);
      font-family: "BIZ UDPGothic", "Yu Gothic", sans-serif;
    }

    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 14px 14px 40px;
    }

    .sheet {
      background: var(--sheet);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .masthead {
      padding: 18px 22px 14px;
      border-bottom: 3px double var(--line-strong);
    }

    .masthead-top,
    .badge-row,
    .link-row,
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }

    .masthead-top {
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .paper-label,
    .section-kicker {
      margin: 0;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    h1, h2, h3, h4 {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      line-height: 1.25;
    }

    h1 {
      font-size: clamp(36px, 7vw, 64px);
      text-align: center;
      letter-spacing: 0.08em;
    }

    h2 { font-size: 30px; }
    h3 { font-size: 24px; }
    h4 { font-size: 18px; }

    p { margin: 0; line-height: 1.85; }

    .subtitle,
    .body,
    .small {
      color: var(--muted);
    }

    .subtitle {
      margin-top: 8px;
      text-align: center;
      font-size: 15px;
    }

    .small { font-size: 13px; }

    .navline {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .section {
      padding: 22px;
      border-top: 1px solid var(--line);
    }

    .hero-grid,
    .news-grid,
    .deep-grid,
    .two-col,
    .stats-grid {
      display: grid;
      gap: 18px;
    }

    .hero-grid {
      grid-template-columns: minmax(0, 1.55fr) minmax(320px, 0.95fr);
    }

    .news-grid {
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.9fr);
    }

    .deep-grid,
    .two-col {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .stats-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .hero-main {
      padding-right: 18px;
      border-right: 1px solid var(--line);
    }

    .hero-side {
      background: rgba(23, 27, 31, 0.02);
      padding-left: 4px;
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--ink);
    }

    .section-desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(23, 27, 31, 0.06);
    }

    .red { background: var(--accent-soft); color: var(--accent); }
    .navy { background: var(--navy-soft); color: var(--navy); }
    .green { background: var(--green-soft); color: var(--green); }

    .lead {
      margin-top: 14px;
      font-size: 20px;
      line-height: 1.9;
    }

    .summary-box,
    .stat-card,
    .story-card,
    .digest-card,
    .memo-card,
    .box {
      padding: 16px 18px;
      border: 1px solid var(--line);
      background: var(--sheet);
    }

    .summary-box {
      margin-top: 18px;
      background: linear-gradient(180deg, rgba(138, 31, 31, 0.05), rgba(138, 31, 31, 0.01));
    }

    .story-card.feature {
      min-height: 100%;
    }

    .story-card h3,
    .digest-card h4,
    .memo-card h4 {
      margin-top: 10px;
    }

    .story-card p,
    .digest-card p,
    .memo-card p {
      margin-top: 10px;
    }

    .story-meta {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      align-items: center;
    }

    .story-link {
      color: var(--navy);
      text-decoration: none;
      border-bottom: 1px solid rgba(25, 54, 82, 0.28);
    }

    .story-link:hover {
      border-bottom-color: var(--navy);
    }

    .headline-list {
      display: grid;
      gap: 12px;
    }

    .headline-item {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .headline-item:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .headline-item a {
      color: var(--ink);
      text-decoration: none;
    }

    .headline-item a:hover {
      color: var(--navy);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--muted);
      white-space: nowrap;
    }

    ul.plain {
      margin: 12px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    .mono {
      font-family: ui-monospace, "Cascadia Code", "SFMono-Regular", monospace;
      font-size: 12px;
    }

    .empty,
    .loading,
    .error {
      padding: 16px;
      border: 1px dashed var(--line-strong);
      background: rgba(23, 27, 31, 0.02);
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 1020px) {
      .hero-grid,
      .news-grid,
      .deep-grid,
      .two-col {
        grid-template-columns: 1fr;
      }

      .hero-main {
        border-right: 0;
        padding-right: 0;
      }

      .hero-side {
        padding-left: 0;
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 8px 8px 28px;
      }

      .masthead,
      .section {
        padding: 16px;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="sheet">
      <header class="masthead" id="masthead">
        <div class="loading">朝刊を読み込んでいます。</div>
      </header>

      <section class="section" id="hero-section"></section>
      <section class="section" id="news-section"></section>
      <section class="section" id="deep-section"></section>
      <section class="section" id="pick-section"></section>
      <section class="section" id="source-section"></section>
      <section class="section" id="zero-day-section"></section>
      <section class="section" id="footer-section"></section>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const arr = (v) => Array.isArray(v) ? v : [];
    const safe = (v, d = "情報なし") => v == null || v === "" ? d : String(v);
    const esc = (v) => safe(v, "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll("\"", "&quot;");
    const clip = (v, n = 120) => { const t = safe(v, ""); return t.length > n ? `${t.slice(0, n - 1)}…` : t; };
    const norm = (v) => safe(v, "").toLowerCase().replace(/\s+/g, "").replace(/[【】［］\[\]（）()＜＞<>「」『』・:：!！?？,，.。/]/g, "");
    const uniq = (items, keyOf) => {
      const seen = new Set();
      return (items || []).filter((item) => {
        const key = keyOf(item);
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    };
    const jpTime = (v) => {
      const d = new Date(v || "");
      return Number.isNaN(d.getTime())
        ? safe(v, "日時不明")
        : new Intl.DateTimeFormat("ja-JP", {
            timeZone: "Asia/Tokyo",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          }).format(d);
    };
    const sourceLabel = (v) => ({ x: "X", kabutan: "株探", minkabu: "みんかぶ", yahoo: "Yahoo" }[v] || safe(v, "source"));

    function classifyMode(data) {
      const direct = arr(data.direct_picks);
      const assoc = arr(data.associative_picks || data.stock_picks);
      const watch = arr(data.watch_candidates);
      const sector = arr(data.sector_watch);
      const process = arr(data.process_watch);
      if (direct.length + assoc.length > 0) {
        const top = direct[0] || assoc[0];
        return {
          edition: "本命候補号",
          lead: `${top.name} を含む本命候補が立っています。ニュースを軸に、どのテーマが実需に繋がるかを見極める日です。`,
          focus: top.root_theme || data.market_sentiment,
        };
      }
      if (watch.length > 0) {
        return {
          edition: "監視強化号",
          lead: "まだ本命化は早いものの、ニュースの積み上がり次第で昇格し得る監視候補が残っています。",
          focus: watch[0].root_theme || data.market_sentiment,
        };
      }
      if (sector.length + process.length > 0) {
        return {
          edition: "0件日運用号",
          lead: "個別材料が薄い日は、ニュースを無理に捻り出さず、背景相場と次の火種の条件整理を優先します。",
          focus: sector[0]?.sector || process[0]?.process || data.market_sentiment,
        };
      }
      return {
        edition: "背景整理号",
        lead: "今日はまず背景ニュースを読む日です。為替・原油・金利・指数の方向感を先に揃えます。",
        focus: arr(data.market_backdrop)[0]?.theme || data.market_sentiment,
      };
    }

    function collectNewsStories(data) {
      const seeded = [];
      const pushThemeNews = (themes, role) => arr(themes).forEach((theme) => {
        arr(theme.news_items).forEach((item, index) => {
          seeded.push({
            theme: theme.theme,
            role,
            source: item.source,
            headline: item.headline,
            summary: item.summary,
            url: item.url,
            timestamp: item.timestamp,
            why: theme.why_it_matters,
            processes: arr(theme.beneficiary_processes),
            priority: role === "investable" ? 30 : role === "backdrop" ? 20 : 10,
            order: index,
          });
        });
      });

      pushThemeNews(data.investable_themes, "investable");
      pushThemeNews(data.market_backdrop, "backdrop");
      pushThemeNews(data.trending_themes, "theme");

      return uniq(
        seeded.sort((a, b) => {
          const priorityDiff = b.priority - a.priority;
          if (priorityDiff !== 0) return priorityDiff;
          const timeDiff = new Date(b.timestamp || 0).getTime() - new Date(a.timestamp || 0).getTime();
          if (timeDiff !== 0) return timeDiff;
          return a.order - b.order;
        }),
        (item) => safe(item.url, "").trim() || `${norm(item.theme)}|${norm(item.headline)}`
      );
    }

    function collectSourceDesk(data) {
      const seeded = [];
      collectNewsStories(data).forEach((item) => seeded.push(item));
      arr(data.source_list).forEach((item) => seeded.push(item));
      arr(data.hypothesis_sources).forEach((item) => seeded.push(item));
      if (!arr(data.hypothesis_sources).length) {
        arr(data.trending_themes).forEach((theme) => {
          arr(theme.key_tweets).slice(0, 1).forEach((text) => seeded.push({
            source: "x",
            headline: text,
            role: "hypothesis",
            theme: theme.theme,
          }));
        });
      }
      return uniq(
        seeded.sort((a, b) => new Date(b.timestamp || 0).getTime() - new Date(a.timestamp || 0).getTime()),
        (item) => safe(item.url, "").trim() || `${safe(item.role, "")}|${safe(item.source, "")}|${norm(item.headline)}`
      );
    }

    function sourceKind(item) {
      const text = `${safe(item.headline, "")} ${safe(item.theme, "")}`;
      if (item.source === "x" || item.role === "hypothesis") return "hypothesis";
      if (item.role === "backdrop" || /(ドル円|円安|円高|金利|原油|先物|市況|雇用|cpi|fomc|指数|ホルムズ|lng|opec|iea)/i.test(text)) return "background";
      return "evidence";
    }

    function renderTable(headers, rows) {
      if (!rows.length) return '<div class="empty">掲載できる項目がまだありません。</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${headers.map((h) => `<th>${esc(h)}</th>`).join("")}</tr></thead>
            <tbody>${rows.map((row) => `<tr>${row.map((col) => `<td>${col}</td>`).join("")}</tr>`).join("")}</tbody>
          </table>
        </div>
      `;
    }

    function buildMasthead(data) {
      const mode = classifyMode(data);
      return `
        <div class="masthead-top">
          <p class="paper-label">KABUKURA MORNING EDITION</p>
          <div class="badge-row">
            <span class="badge red">${esc(mode.edition)}</span>
            <span class="badge navy">${esc(jpTime(data.analysis_date))} JST</span>
          </div>
        </div>
        <h1>株クラ朝刊</h1>
        <p class="subtitle">ニュースを主役に、朝に読む順番で整理する株クラの一枚紙です。</p>
        <div class="navline">一面トップ / 主要ニュース / テーマ別深掘り / 銘柄メモ / ソース棚 / 0件日運用 / Markdown / JSON</div>
      `;
    }

    function buildHeroSection(data) {
      const mode = classifyMode(data);
      const stories = collectNewsStories(data);
      const leadStory = stories[0];
      const checks = uniq(
        [...arr(data.next_checks), ...arr(data.next_check_guidance).flatMap((g) => arr(g.triggers))],
        (item) => norm(item)
      ).slice(0, 5);

      const leadCard = leadStory
        ? `
          <article class="story-card feature">
            <div class="badge-row">
              <span class="badge ${leadStory.role === "investable" ? "navy" : "green"}">${esc(leadStory.role === "investable" ? "トップ記事" : "背景トップ")}</span>
              <span class="badge">${esc(sourceLabel(leadStory.source))}</span>
            </div>
            <h2 style="margin-top:12px;">${leadStory.url ? `<a class="story-link" href="${esc(leadStory.url)}" target="_blank" rel="noopener noreferrer">${esc(leadStory.headline)}</a>` : esc(leadStory.headline)}</h2>
            <p class="lead">${esc(leadStory.summary || leadStory.why || data.market_sentiment)}</p>
            <div class="summary-box">
              <p><strong>どう読むか:</strong> ${esc(clip(leadStory.why || data.market_sentiment, 170))}</p>
              <p class="body" style="margin-top:8px;"><strong>関連テーマ:</strong> ${esc(leadStory.theme)}</p>
              ${leadStory.processes.length ? `<p class="body" style="margin-top:8px;"><strong>注視工程:</strong> ${esc(leadStory.processes.slice(0, 3).join(" / "))}</p>` : ""}
            </div>
          </article>
        `
        : `
          <article class="story-card feature">
            <h2>今日の結論</h2>
            <p class="lead">${esc(mode.lead)}</p>
            <div class="summary-box">
              <p><strong>主眼:</strong> ${esc(clip(mode.focus, 120))}</p>
              <p class="body" style="margin-top:8px;">${esc(clip(data.market_sentiment, 170))}</p>
            </div>
          </article>
        `;

      return `
        <div class="hero-grid">
          <div class="hero-main">
            <p class="section-kicker">Front Story</p>
            ${leadCard}
          </div>
          <aside class="hero-side">
            <div class="section-head">
              <div>
                <p class="section-kicker">Morning Memo</p>
                <h4>朝のメモ</h4>
              </div>
            </div>
            <div class="stats-grid">
              <div class="stat-card"><div class="small">主要ニュース</div><h3 style="margin-top:6px;">${collectNewsStories(data).length}</h3></div>
              <div class="stat-card"><div class="small">本命候補</div><h3 style="margin-top:6px;">${arr(data.direct_picks).length + arr(data.associative_picks || data.stock_picks).length}</h3></div>
              <div class="stat-card"><div class="small">監視候補</div><h3 style="margin-top:6px;">${arr(data.watch_candidates).length}</h3></div>
              <div class="stat-card"><div class="small">注視テーマ</div><h3 style="margin-top:6px;">${arr(data.investable_themes).length || arr(data.market_backdrop).length}</h3></div>
            </div>
            <div class="box" style="margin-top:14px;">
              <p class="section-kicker">今日の結論</p>
              <p>${esc(mode.lead)}</p>
            </div>
            <div class="box" style="margin-top:14px;">
              <p class="section-kicker">朝イチ確認</p>
              ${checks.length ? `<ul class="plain">${checks.map((item) => `<li>${esc(item)}</li>`).join("")}</ul>` : '<div class="small">確認項目は未整理です。</div>'}
            </div>
          </aside>
        </div>
      `;
    }

    function buildNewsSection(data) {
      const stories = collectNewsStories(data);
      const topList = stories.slice(1, 6);
      const digest = stories.slice(0, 8).map((story) => [
        `<strong>${esc(story.theme)}</strong>`,
        story.url ? `<a class="story-link" href="${esc(story.url)}" target="_blank" rel="noopener noreferrer">${esc(clip(story.headline, 80))}</a>` : esc(clip(story.headline, 80)),
        esc(clip(story.summary || story.why || "-", 90)),
        `<span class="mono">${esc(sourceLabel(story.source))} / ${esc(story.timestamp ? jpTime(story.timestamp) : "-")}</span>`,
      ]);

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Main News</p>
            <h3>主要ニュース</h3>
            <p class="section-desc">まずニュースの内容を読む面です。見出しだけでなく、要点まで載せます。</p>
          </div>
        </div>
        <div class="news-grid">
          <div class="box">
            <div class="headline-list">
              ${topList.length ? topList.map((story, index) => `
                <article class="headline-item">
                  <div class="badge-row">
                    <span class="badge ${story.role === "investable" ? "navy" : "green"}">${index + 2}面</span>
                    <span class="badge">${esc(sourceLabel(story.source))}</span>
                  </div>
                  <h4>${story.url ? `<a class="story-link" href="${esc(story.url)}" target="_blank" rel="noopener noreferrer">${esc(story.headline)}</a>` : esc(story.headline)}</h4>
                  <p class="body">${esc(story.summary || story.why || "-")}</p>
                  <div class="story-meta">
                    <span class="small">関連テーマ: ${esc(story.theme)}</span>
                    <span class="mono">${esc(story.timestamp ? jpTime(story.timestamp) : "-")}</span>
                  </div>
                </article>
              `).join("") : '<div class="empty">主要ニュースがまだありません。</div>'}
            </div>
          </div>
          <div class="box">
            <p class="section-kicker">News Digest</p>
            ${renderTable(["テーマ", "見出し", "要点", "ソース"], digest)}
          </div>
        </div>
      `;
    }

    function buildDeepSection(data) {
      const themes = (arr(data.investable_themes).length ? arr(data.investable_themes) : arr(data.market_backdrop)).slice(0, 4);
      if (!themes.length) {
        return `
          <div class="section-head">
            <div>
              <p class="section-kicker">Deep Dive</p>
              <h3>テーマ別深掘り</h3>
            </div>
          </div>
          <div class="empty">深掘りできるテーマがありません。</div>
        `;
      }

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Deep Dive</p>
            <h3>テーマ別深掘り</h3>
            <p class="section-desc">ニュースをテーマごとに読み直し、何が重要で、どこを見るかを整理します。</p>
          </div>
        </div>
        <div class="deep-grid">
          ${themes.map((theme) => `
            <article class="digest-card">
              <div class="badge-row">
                <span class="badge ${arr(data.investable_themes).some((item) => item.theme === theme.theme) ? "navy" : "green"}">${arr(data.investable_themes).some((item) => item.theme === theme.theme) ? "本命テーマ" : "背景テーマ"}</span>
              </div>
              <h4>${esc(theme.theme)}</h4>
              <p class="body">${esc(theme.why_it_matters || "重要度の整理はこれからです。")}</p>
              ${arr(theme.news_items).length ? `
                <ul class="plain">
                  ${arr(theme.news_items).slice(0, 3).map((item) => `
                    <li>
                      <strong>${esc(item.headline)}</strong><br>
                      <span class="body">${esc(item.summary || "要点なし")}</span><br>
                      <span class="small">${esc(sourceLabel(item.source))}${item.timestamp ? ` / ${esc(jpTime(item.timestamp))}` : ""}</span>
                    </li>
                  `).join("")}
                </ul>
              ` : '<div class="small" style="margin-top:12px;">関連ニュースはまだ紐付いていません。</div>'}
              ${arr(theme.beneficiary_processes).length ? `<p class="small" style="margin-top:12px;"><strong>注視工程:</strong> ${esc(arr(theme.beneficiary_processes).slice(0, 4).join(" / "))}</p>` : ""}
            </article>
          `).join("")}
        </div>
      `;
    }

    function buildPickSection(data) {
      const direct = arr(data.direct_picks);
      const assoc = arr(data.associative_picks || data.stock_picks);
      const watch = arr(data.watch_candidates);
      const rows = [
        ...direct.map((pick) => ["本命", pick]),
        ...assoc.map((pick) => ["本命候補", pick]),
        ...watch.map((pick) => ["監視", pick]),
      ].slice(0, 8).map(([label, pick]) => [
        esc(label),
        `<strong>${esc(pick.name)} (${esc(pick.code)})</strong>`,
        esc(clip(pick.root_theme || pick.reasoning || pick.chain || "-", 80)),
        esc(clip(pick.reasoning || "-", 95)),
        esc(clip(pick.catalyst || "-", 60)),
      ]);

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Candidate Memo</p>
            <h3>銘柄メモ</h3>
            <p class="section-desc">ニュース面を読んだあとに、どの銘柄へ繋ぐかを確認する欄です。</p>
          </div>
        </div>
        ${rows.length ? renderTable(["区分", "銘柄", "根テーマ", "読み筋", "昇格条件"], rows) : '<div class="empty">今日はニュース優先で、銘柄候補はまだ絞り込んでいません。</div>'}
      `;
    }

    function buildSourceSection(data) {
      const desk = collectSourceDesk(data);
      const evidence = desk.filter((item) => sourceKind(item) === "evidence");
      const hypothesis = desk.filter((item) => sourceKind(item) === "hypothesis");
      const background = desk.filter((item) => sourceKind(item) === "background");

      const buildRows = (items) => items.slice(0, 8).map((item) => [
        esc(item.theme || "-"),
        item.url ? `<a class="story-link" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">${esc(clip(item.headline, 72))}</a>` : esc(clip(item.headline, 72)),
        esc(sourceLabel(item.source)),
        `<span class="mono">${esc(item.timestamp ? jpTime(item.timestamp) : "-")}</span>`,
      ]);

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Source Desk</p>
            <h3>ソース棚</h3>
            <p class="section-desc">根拠源・仮説源・背景源を混ぜずに棚分けします。</p>
          </div>
        </div>
        <div class="two-col">
          <div class="memo-card">
            <div class="badge-row"><span class="badge navy">根拠源</span></div>
            ${renderTable(["関連テーマ", "見出し", "ソース", "時刻"], buildRows(evidence))}
          </div>
          <div class="memo-card">
            <div class="badge-row"><span class="badge green">背景源</span></div>
            ${renderTable(["関連テーマ", "見出し", "ソース", "時刻"], buildRows(background))}
          </div>
        </div>
        <div class="memo-card" style="margin-top:18px;">
          <div class="badge-row"><span class="badge red">仮説源</span></div>
          ${renderTable(["関連テーマ", "観測メモ", "ソース", "時刻"], buildRows(hypothesis))}
        </div>
      `;
    }

    function buildZeroDaySection(data) {
      const boards = [
        ...arr(data.sector_watch).map((item) => ({
          label: "注視業種",
          title: item.sector,
          body: item.why,
          points: arr(item.promotion_conditions),
        })),
        ...arr(data.process_watch).map((item) => ({
          label: "注視工程",
          title: item.process,
          body: item.focus,
          points: arr(item.promotion_conditions),
        })),
      ];

      if (!boards.length) {
        return `
          <div class="section-head">
            <div>
              <p class="section-kicker">Zero-Idea Desk</p>
              <h3>0件日運用</h3>
            </div>
          </div>
          <div class="empty">0件日ボードはありません。</div>
        `;
      }

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Zero-Idea Desk</p>
            <h3>0件日でも残す紙面</h3>
            <p class="section-desc">ニュースが薄い日でも、次に何を見るかは紙面に残します。</p>
          </div>
        </div>
        <div class="two-col">
          ${boards.slice(0, 6).map((item) => `
            <article class="memo-card">
              <div class="badge-row"><span class="badge ${item.label === "注視業種" ? "green" : "red"}">${esc(item.label)}</span></div>
              <h4>${esc(item.title)}</h4>
              <p class="body">${esc(clip(item.body, 140))}</p>
              ${item.points.length ? `<ul class="plain">${item.points.slice(0, 3).map((point) => `<li>${esc(point)}</li>`).join("")}</ul>` : ""}
            </article>
          `).join("")}
        </div>
      `;
    }

    function buildFooter(data) {
      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Archive</p>
            <h3>詳細ファイル</h3>
            <p class="section-desc">全文は Markdown と JSON に残します。</p>
          </div>
        </div>
        <div class="link-row">
          <a class="story-link" href="./latest-analysis-full.md">latest-analysis-full.md</a>
          <a class="story-link" href="./latest-analysis-full.json">latest-analysis-full.json</a>
        </div>
        <p class="small" style="margin-top:14px;">最終更新: ${esc(jpTime(data.analysis_date))} / GitHub Pages</p>
      `;
    }

    function render(data) {
      $("masthead").innerHTML = buildMasthead(data);
      $("hero-section").innerHTML = buildHeroSection(data);
      $("news-section").innerHTML = buildNewsSection(data);
      $("deep-section").innerHTML = buildDeepSection(data);
      $("pick-section").innerHTML = buildPickSection(data);
      $("source-section").innerHTML = buildSourceSection(data);
      $("zero-day-section").innerHTML = buildZeroDaySection(data);
      $("footer-section").innerHTML = buildFooter(data);
    }

    function renderError(error) {
      const message = `<div class="error">latest-analysis-full.json の読み込みに失敗しました: ${esc(error.message)}</div>`;
      $("masthead").innerHTML = message;
      ["hero-section", "news-section", "deep-section", "pick-section", "source-section", "zero-day-section", "footer-section"]
        .forEach((id) => { $(id).innerHTML = '<div class="empty">表示に必要なデータを読み込めませんでした。</div>'; });
    }

    fetch("./latest-analysis-full.json", { cache: "no-store" })
      .then((res) => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(render)
      .catch(renderError);
  </script>
</body>
</html>
