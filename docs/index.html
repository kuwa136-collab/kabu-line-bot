<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>株クラ朝刊 Slides</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap");
    :root {
      --paper: #ece4d6;
      --sheet: rgba(255, 252, 247, 0.96);
      --sheet-strong: rgba(255, 255, 255, 0.88);
      --ink: #131920;
      --muted: #67717d;
      --line: rgba(19, 25, 32, 0.1);
      --navy: #1d4162;
      --navy-soft: rgba(29, 65, 98, 0.1);
      --red: #973936;
      --red-soft: rgba(151, 57, 54, 0.1);
      --gold: #aa8450;
      --gold-soft: rgba(170, 132, 80, 0.12);
      --green: #356958;
      --green-soft: rgba(53, 105, 88, 0.11);
      --shadow: 0 30px 90px rgba(19, 25, 32, 0.14);
      --radius: 34px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Zen Kaku Gothic New", "BIZ UDPGothic", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(29, 65, 98, 0.18), transparent 24%),
        radial-gradient(circle at 86% 86%, rgba(151, 57, 54, 0.16), transparent 22%),
        linear-gradient(180deg, #ddd4c6 0%, #d2c7b4 46%, #ebe1d2 100%);
    }
    a { color: inherit; }
    .app { max-width: 1420px; margin: 0 auto; padding: 24px 20px 80px; }
    .toolbar {
      position: sticky; top: 14px; z-index: 30; display: flex; justify-content: space-between; align-items: center; gap: 18px;
      padding: 16px 18px; margin-bottom: 26px; border: 1px solid var(--line); border-radius: 24px;
      background: rgba(244, 238, 230, 0.86); backdrop-filter: blur(14px); box-shadow: 0 18px 50px rgba(19, 25, 32, 0.08);
    }
    .brand { display: grid; gap: 6px; }
    .brand h1, .title, .heroHeadline, .storyTitle, .panelTitle, .boardTitle, .sourceTitle {
      font-family: "Shippori Mincho", "Yu Mincho", serif;
    }
    .brand h1 { margin: 0; font-size: clamp(24px, 3vw, 40px); line-height: 1; }
    .brand p:last-child { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.8; }
    .eyebrow { margin: 0; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .toolbarMeta, .tagRow, .chips, .heroTicker, .storyMeta, .storyFlow, .footerLinks { display: flex; flex-wrap: wrap; gap: 10px; }
    .meta, .link, .tag, .chip {
      display: inline-flex; align-items: center; justify-content: center; min-height: 34px; padding: 7px 12px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(255, 253, 248, 0.94); text-decoration: none; font-size: 12px;
    }
    .link:hover { border-color: var(--navy); color: var(--navy); }
    .redTag { border-color: rgba(151, 57, 54, 0.24); background: var(--red-soft); color: var(--red); }
    .navyTag { border-color: rgba(29, 65, 98, 0.24); background: var(--navy-soft); color: var(--navy); }
    .goldTag { border-color: rgba(170, 132, 80, 0.24); background: var(--gold-soft); color: var(--gold); }
    .greenTag { border-color: rgba(53, 105, 88, 0.24); background: var(--green-soft); color: var(--green); }
    .deck { display: grid; gap: 28px; scroll-snap-type: y proximity; }
    .slide {
      position: relative; aspect-ratio: 16 / 9; min-height: 720px; padding: 34px; border: 1px solid var(--line); border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(245, 239, 230, 0.98)); box-shadow: var(--shadow); overflow: hidden;
      scroll-snap-align: start;
    }
    .slide::before, .slide::after { content: ""; position: absolute; border-radius: 999px; pointer-events: none; }
    .slide::before {
      width: 420px; height: 420px; top: -180px; right: -120px; background: radial-gradient(circle, rgba(29, 65, 98, 0.12), transparent 68%);
    }
    .slide::after {
      width: 320px; height: 320px; left: -90px; bottom: -130px; background: radial-gradient(circle, rgba(151, 57, 54, 0.12), transparent 72%);
    }
    .cover { background: linear-gradient(140deg, rgba(255, 252, 247, 0.99), rgba(239, 231, 218, 0.98) 66%, rgba(230, 220, 206, 0.98)); }
    .ink { background: linear-gradient(140deg, rgba(255, 252, 247, 0.98), rgba(236, 241, 245, 0.98)); }
    .red { background: linear-gradient(140deg, rgba(255, 252, 247, 0.98), rgba(248, 236, 232, 0.98)); }
    .green { background: linear-gradient(140deg, rgba(255, 252, 247, 0.98), rgba(235, 243, 238, 0.98)); }
    .head {
      position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; margin-bottom: 22px;
    }
    .title { margin: 0; font-size: clamp(36px, 4vw, 60px); line-height: 1.04; }
    .desc { margin: 10px 0 0; max-width: 44ch; color: var(--muted); font-size: 14px; line-height: 1.85; }
    .no {
      display: inline-flex; align-items: center; justify-content: center; min-width: 84px; min-height: 84px;
      border: 1px solid var(--line); border-radius: 22px; background: rgba(255, 253, 248, 0.9); color: var(--muted); font-size: 13px; line-height: 1.5; text-align: center;
    }
    .heroLayout, .storiesLayout, .themeLayout, .watchLayout, .sourceLayout, .zeroLayout {
      position: relative; z-index: 1; display: grid; gap: 20px; align-items: stretch;
    }
    .heroLayout { grid-template-columns: 1.04fr 0.96fr; }
    .storiesLayout { grid-template-columns: 1.06fr 0.94fr; }
    .themeLayout { grid-template-columns: 1.08fr 0.92fr; }
    .watchLayout { grid-template-columns: 0.98fr 1.02fr; }
    .sourceLayout, .zeroLayout { grid-template-columns: 1.04fr 0.96fr; }
    .leadPanel, .figurePanel, .storyPoster, .noteCard, .watchCard, .sourceCard, .miniBoard {
      position: relative; border: 1px solid var(--line); border-radius: 30px; background: var(--sheet); box-shadow: 0 16px 44px rgba(19, 25, 32, 0.06); overflow: hidden;
    }
    .leadPanel, .storyPoster, .noteCard, .watchCard, .sourceCard, .miniBoard { padding: 20px; }
    .leadPanel::before, .storyPoster::before, .noteCard::before, .watchCard::before, .sourceCard::before, .miniBoard::before {
      content: ""; position: absolute; left: 18px; top: 0; width: 86px; height: 4px; border-radius: 0 0 10px 10px; background: linear-gradient(90deg, var(--navy), transparent);
    }
    .leadPanel::before, .storyPoster.featured::before { background: linear-gradient(90deg, var(--red), transparent); }
    .figurePanel {
      padding: 18px;
      background:
        radial-gradient(circle at 18% 18%, rgba(29, 65, 98, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255, 253, 248, 0.99), rgba(244, 238, 229, 0.96));
    }
    .figurePanel svg, .storyVisual svg { width: 100%; height: auto; display: block; }
    .heroHeadline { margin: 14px 0 0; font-size: clamp(48px, 5vw, 78px); line-height: 1.06; letter-spacing: -0.02em; text-wrap: balance; }
    .heroSentence, .storySummary, .bodyCopy, .miniCopy, .figureNote { color: var(--muted); line-height: 1.9; }
    .heroSentence { margin: 18px 0 0; max-width: 36ch; font-size: 15px; }
    .heroTicker { margin-top: 18px; }
    .tickerCard {
      padding: 14px 16px; border: 1px solid var(--line); border-radius: 22px; background: var(--sheet-strong); min-width: 180px; flex: 1 1 180px;
    }
    .tickerCard strong { display: block; margin-top: 8px; line-height: 1.55; font-size: 15px; }
    .factStrip { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-top: 18px; }
    .factCard {
      min-height: 116px; padding: 14px 16px; border: 1px solid var(--line); border-radius: 24px; background: var(--sheet-strong);
    }
    .factCard span { display: block; color: var(--muted); font-size: 13px; }
    .factCard strong { display: block; margin-top: 12px; font-size: 30px; line-height: 1; }
    .heroAgenda {
      margin-top: 18px; padding: 16px 18px; border: 1px solid var(--line); border-radius: 24px;
      background: linear-gradient(180deg, rgba(29, 65, 98, 0.06), rgba(255, 253, 248, 0.96));
    }
    .heroAgenda strong { display: block; margin-top: 8px; font-size: 18px; }
    .heroAgenda p { margin: 10px 0 0; }
    .figureNote { margin: 14px 0 0; font-size: 13px; }
    .storyStack, .watchStack, .sourceShelf, .boardStack, .sourceItems, .themeNotes { display: grid; gap: 16px; }
    .storyPoster { display: grid; gap: 14px; align-content: start; }
    .storyPoster.featured {
      min-height: 100%; padding: 24px; background: linear-gradient(180deg, rgba(29, 65, 98, 0.08), rgba(255, 252, 247, 0.98));
    }
    .storyVisual {
      padding: 10px; border: 1px solid var(--line); border-radius: 26px;
      background:
        radial-gradient(circle at top left, rgba(29, 65, 98, 0.13), transparent 36%),
        linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(246, 241, 233, 0.96));
    }
    .storyTitle { margin: 0; font-size: clamp(26px, 2.3vw, 38px); line-height: 1.28; text-wrap: balance; }
    .storyPoster:not(.featured) .storyTitle { font-size: 24px; }
    .storyTitle a { text-decoration: none; border-bottom: 1px solid rgba(29, 65, 98, 0.22); }
    .storyTitle a:hover { color: var(--navy); border-bottom-color: var(--navy); }
    .storySummary { margin: 0; font-size: 14px; }
    .flowDot { color: var(--muted); font-size: 16px; }
    .themeNotes { grid-template-columns: repeat(2, minmax(0, 1fr)); align-content: start; }
    .noteCard { min-height: 204px; }
    .noteCard[data-tone="red"]::before { background: linear-gradient(90deg, var(--red), transparent); }
    .noteCard[data-tone="navy"]::before { background: linear-gradient(90deg, var(--navy), transparent); }
    .noteCard::after {
      content: attr(data-no); position: absolute; right: 16px; top: 10px; font-family: "Shippori Mincho", serif; font-size: 56px; line-height: 1; color: rgba(19, 25, 32, 0.06);
    }
    .panelTitle, .boardTitle, .sourceTitle { margin: 12px 0 0; font-size: 28px; line-height: 1.18; }
    .mentionStat {
      display: inline-flex; align-items: center; justify-content: center; min-width: 54px; min-height: 54px; border: 1px solid var(--line); border-radius: 18px; background: rgba(255, 253, 248, 0.92);
      font-family: "Shippori Mincho", serif; font-size: 24px; color: rgba(19, 25, 32, 0.56);
    }
    .noteHead, .sourceHead { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .noteCard strong, .watchCard strong, .sourceItem strong, .miniBoard strong { display: block; margin-top: 10px; line-height: 1.6; }
    .watchCard[data-tone="red"]::before { background: linear-gradient(90deg, var(--red), transparent); }
    .watchCard[data-tone="gold"]::before { background: linear-gradient(90deg, var(--gold), transparent); }
    .watchCard[data-tone="navy"]::before { background: linear-gradient(90deg, var(--navy), transparent); }
    .watchBar { width: 100%; height: 8px; margin-top: 14px; border-radius: 999px; background: rgba(19, 25, 32, 0.08); overflow: hidden; }
    .watchBar span { display: block; height: 100%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); }
    .sourceCard[data-tone="red"]::before { background: linear-gradient(90deg, var(--red), transparent); }
    .sourceCard[data-tone="gold"]::before { background: linear-gradient(90deg, var(--gold), transparent); }
    .sourceCard[data-tone="navy"]::before { background: linear-gradient(90deg, var(--navy), transparent); }
    .sourceItems { margin-top: 14px; }
    .sourceItem { padding: 14px 16px; border: 1px solid var(--line); border-radius: 22px; background: rgba(255, 253, 248, 0.92); }
    .sourceItem p, .miniBoard p { margin: 10px 0 0; }
    .miniBoard { min-height: 230px; }
    .chipWall { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .footer { margin-top: 22px; padding: 16px 6px 0; color: rgba(19, 25, 32, 0.72); font-size: 13px; line-height: 1.8; }
    .empty {
      display: grid; place-items: center; min-height: 220px; padding: 18px; border: 1px dashed rgba(19, 25, 32, 0.16); border-radius: 26px;
      background: rgba(255, 253, 248, 0.78); color: var(--muted); text-align: center; line-height: 1.8;
    }
    .error { padding: 18px; border: 1px solid rgba(151, 57, 54, 0.22); border-radius: 20px; background: rgba(151, 57, 54, 0.08); color: var(--red); }
    @media (max-width: 1180px) { .factStrip, .themeNotes { grid-template-columns: 1fr; } }
    @media (max-width: 1024px) {
      .toolbar, .heroLayout, .storiesLayout, .themeLayout, .watchLayout, .sourceLayout, .zeroLayout { grid-template-columns: 1fr; }
      .toolbar { position: static; align-items: flex-start; }
      .toolbarMeta { justify-content: flex-start; }
      .slide { aspect-ratio: auto; min-height: 0; padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header id="masthead"></header>
    <main class="deck" id="deck"><div class="empty">読み込み中です…</div></main>
    <footer class="footer" id="footer"></footer>
  </div>
  <script>
    const SOURCE_LABELS = { yahoo: "Yahoo", kabutan: "株探", minkabu: "みんかぶ", x: "X", ir: "IR", guide: "Guide" };
    const HYPOTHESIS_RE = /株|決算|受注|中東|原油|LNG|FOMC|日銀|ドル円|金利|会談|首脳|設備|データセンター|AI|半導体|防衛|電力|化工|プラント/;
    const $ = (id) => document.getElementById(id);
    const toStr = (value, fallback = "") => value == null ? fallback : String(value);
    const asArray = (value) => Array.isArray(value) ? value : [];
    const escapeHtml = (value) => toStr(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;");
    const clip = (value, limit = 80) => {
      const chars = Array.from(toStr(value));
      return chars.length > limit ? chars.slice(0, limit).join("") + "…" : chars.join("");
    };
    const normalizeKey = (value) => toStr(value).toLowerCase().replace(/https?:\/\/\S+/g, "").replace(/[\s　]+/g, "").replace(/[!！?？:：・.,，。\/\\\-_"'`~\[\]()]/g, "");
    const cleanUrl = (value) => toStr(value).toLowerCase().replace(/[?#].*$/, "");
    const uniqBy = (list, keyFn) => {
      const seen = new Set();
      const result = [];
      list.forEach((item) => {
        const key = keyFn(item);
        if (!key || seen.has(key)) return;
        seen.add(key);
        result.push(item);
      });
      return result;
    };
    const label = (source) => SOURCE_LABELS[toStr(source).toLowerCase()] || toStr(source, "Source");
    const jp = (value, options = { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) => {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return toStr(value);
      return new Intl.DateTimeFormat("ja-JP", { timeZone: "Asia/Tokyo", ...options }).format(date);
    };
    const full = (value) => jp(value, { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    const textLines = (text, charsPerLine = 11, maxLines = 3) => {
      const chars = Array.from(toStr(text));
      if (!chars.length) return [];
      const lines = [];
      while (chars.length && lines.length < maxLines) lines.push(chars.splice(0, charsPerLine).join(""));
      if (chars.length && lines.length) lines[lines.length - 1] = clip(lines[lines.length - 1] + chars.join(""), charsPerLine);
      return lines;
    };
    const svgText = (x, y, text, options = {}) => {
      const lines = textLines(text, options.chars || 11, options.max || 3);
      return lines.map((line, index) => {
        const lineHeight = options.lineHeight || ((options.size || 15) + 4);
        return `<text x="${x}" y="${y + (index * lineHeight)}" text-anchor="${options.anchor || "middle"}" font-size="${options.size || 15}" font-weight="${options.weight || 700}" fill="${options.fill || "#131920"}" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">${escapeHtml(line)}</text>`;
      }).join("");
    };
    const normNews = (item, fallback = {}) => ({
      source: toStr(item.source, fallback.source || ""),
      headline: toStr(item.headline, fallback.headline || ""),
      summary: toStr(item.summary || item.why, fallback.summary || ""),
      why: toStr(item.why, fallback.why || ""),
      url: toStr(item.url, fallback.url || ""),
      timestamp: toStr(item.timestamp, fallback.timestamp || ""),
      role: toStr(item.role, fallback.role || ""),
      theme: toStr(item.theme, fallback.theme || "")
    });
    const category = (item) => {
      const text = `${toStr(item.headline)} ${toStr(item.summary)} ${toStr(item.why)} ${toStr(item.theme)}`;
      if (/中東|原油|LNG|化工|プラント|エネルギー/.test(text)) return "エネルギー";
      if (/FOMC|日銀|ドル円|金利|会談|首脳/.test(text)) return "マクロ";
      if (/決算|IR|受注|提携|設備|工場|会社/.test(text)) return "企業材料";
      if (/AI|半導体|データセンター|電力/.test(text)) return "設備投資";
      return item.source === "x" ? "仮説メモ" : "市場ニュース";
    };
    const nextAction = (item) => {
      const text = `${toStr(item.headline)} ${toStr(item.summary)} ${toStr(item.why)} ${toStr(item.theme)}`;
      if (/受注|工期|工程|契約|採算/.test(text)) return "工程と受注の更新を追う";
      if (/決算|説明会|IR|開示/.test(text)) return "開示と会社説明を確認";
      if (/原油|中東|金利|ドル円|FOMC|会談/.test(text)) return "地合いの継続を確認";
      return "続報を待つ";
    };
    const kindTone = (index) => index % 2 === 0 ? "red" : "navy";
    function ctx(data) {
      const themeSeed = asArray(data.investable_themes).length ? asArray(data.investable_themes).map((item) => ({ ...item, kind: "investable" })) : asArray(data.market_backdrop).map((item) => ({ ...item, kind: "backdrop" }));
      const themes = uniqBy(themeSeed.map((item) => ({
        theme: toStr(item.theme),
        why: toStr(item.why_it_matters),
        mention: +item.mention_count || 0,
        processes: asArray(item.beneficiary_processes),
        news: asArray(item.news_items),
        kind: item.kind
      })), (item) => normalizeKey(item.theme)).slice(0, 4);
      const themeNews = themes.flatMap((theme) => asArray(theme.news).map((item) => normNews(item, { role: theme.kind === "investable" ? "evidence" : "backdrop", theme: theme.theme })));
      const sourceNews = asArray(data.source_list).map((item) => normNews(item, { role: item.role || "evidence" }));
      const hypothesisNews = asArray(data.hypothesis_sources).filter((item) => HYPOTHESIS_RE.test(`${toStr(item.headline)} ${toStr(item.summary)} ${toStr(item.why)} ${toStr(item.theme)}`)).map((item) => normNews(item, { role: "hypothesis" }));
      const news = uniqBy([...themeNews, ...sourceNews, ...hypothesisNews].filter((item) => item.headline), (item) => cleanUrl(item.url) || normalizeKey(item.headline)).slice(0, 8);
      const watchSeed = [];
      const pushWatch = (list, kind) => asArray(list).forEach((item) => watchSeed.push({
        kind, code: toStr(item.code), name: toStr(item.name), root: toStr(item.root_theme), chain: toStr(item.chain), catalyst: toStr(item.catalyst), reason: toStr(item.reasoning), confidence: +item.confidence || 0, risk: toStr(item.risk)
      }));
      pushWatch(data.direct_picks, "direct");
      pushWatch(data.associative_picks || data.stock_picks, "associate");
      pushWatch(data.watch_candidates, "watch");
      const watch = uniqBy(watchSeed, (item) => item.code || normalizeKey(item.name)).slice(0, 4);
      const boards = {
        sectors: uniqBy([...asArray(data.sector_watch), ...asArray(data.next_check_guidance).flatMap((item) => asArray(item.sectors))], (item) => normalizeKey(item)).slice(0, 10),
        processes: uniqBy([...asArray(data.process_watch), ...themes.flatMap((item) => asArray(item.processes)), ...asArray(data.next_check_guidance).flatMap((item) => asArray(item.processes))], (item) => normalizeKey(item)).slice(0, 12),
        checks: uniqBy([...asArray(data.next_checks), ...asArray(data.next_check_guidance).flatMap((item) => asArray(item.triggers))], (item) => normalizeKey(item)).slice(0, 6)
      };
      const used = new Set();
      const keyOf = (item) => cleanUrl(item.url) || normalizeKey(item.headline);
      const evidence = [];
      const background = [];
      const hypothesis = [];
      news.forEach((item) => {
        const key = keyOf(item);
        if (item.source === "x" || !key || used.has(key) || evidence.length >= 3) return;
        used.add(key);
        evidence.push(item);
      });
      asArray(data.source_list).forEach((item) => {
        const newsItem = normNews(item, { role: item.role || "backdrop" });
        const key = keyOf(newsItem);
        if (!key || used.has(key) || background.length >= 3) return;
        used.add(key);
        background.push(newsItem);
      });
      if (!background.length) {
        asArray(data.next_check_guidance).forEach((item) => {
          if (background.length >= 3) return;
          background.push({ source: "guide", headline: toStr(item.theme), summary: clip(asArray(item.processes).join(" / "), 60), theme: toStr(item.theme) });
        });
      }
      hypothesisNews.forEach((item) => {
        const key = keyOf(item);
        if (!key || used.has(key) || hypothesis.length >= 3) return;
        used.add(key);
        hypothesis.push(item);
      });
      return { themes, news, watch, boards, buckets: { evidence, background, hypothesis } };
    }
    const head = (no, labelText, titleText, descText) => `<div class="head"><div><p class="eyebrow">${escapeHtml(labelText)}</p><h2 class="title">${escapeHtml(titleText)}</h2>${descText ? `<p class="desc">${escapeHtml(descText)}</p>` : ""}</div><div class="no">${escapeHtml(no)}<br>SLIDE</div></div>`;
    const metaTag = (text, tone = "") => `<span class="tag ${tone}">${escapeHtml(text)}</span>`;

    function heroFigure(theme, lead, boards, watch) {
      if (!theme) return `<div class="empty">主役テーマがまだありません。ここは朝の読み筋を大きく図で置く場所です。</div>`;
      const processCards = asArray(theme.processes).slice(0, 4).map((item, index) => {
        const y = 110 + (index * 82);
        const tone = index % 2 === 0 ? { stroke: "#973936", fill: "rgba(151,57,54,.11)" } : { stroke: "#1d4162", fill: "rgba(29,65,98,.1)" };
        return `<path d="M270 212 C338 212, 352 ${y + 6}, 418 ${y + 6}" fill="none" stroke="${tone.stroke}" stroke-width="3" stroke-linecap="round"/><rect x="418" y="${y - 24}" width="230" height="56" rx="22" fill="${tone.fill}" stroke="${tone.stroke}" stroke-width="1.6"/>${svgText(533, y + 4, item, { chars: 13, max: 2, size: 14, lineHeight: 16 })}`;

      const checkCards = boards.checks.slice(0, 3).map((item, index) => {
        const x = 34 + (index * 214);
        return `<rect x="${x}" y="438" width="192" height="40" rx="20" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.14)"/>${svgText(x + 96, 462, item, { chars: 15, max: 1, size: 12 })}`;
      }).join("");
      const watchCards = watch.slice(0, 2).map((item, index) => {
        const x = 470 + (index * 116);
        return `<rect x="${x}" y="28" width="102" height="34" rx="17" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.14)"/>${svgText(x + 51, 49, `${item.code} ${item.name}`, { chars: 10, max: 1, size: 11 })}`;
      }).join("");
      return `<div class="figurePanel"><svg viewBox="0 0 760 520" role="img" aria-label="今日の主役テーマと波及先"><defs><radialGradient id="heroGlow" cx="50%" cy="42%" r="58%"><stop offset="0%" stop-color="rgba(151,57,54,.18)"/><stop offset="100%" stop-color="rgba(151,57,54,0)"/></radialGradient></defs><rect x="1" y="1" width="758" height="518" rx="34" fill="rgba(255,253,248,.98)" stroke="rgba(19,25,32,.14)"/><circle cx="206" cy="212" r="150" fill="url(#heroGlow)"/><rect x="26" y="28" width="138" height="34" rx="17" fill="rgba(29,65,98,.12)" stroke="#1d4162"/>${svgText(95, 49, label(lead ? lead.source : "guide"), { chars: 12, max: 1, size: 12 })}${watchCards}<circle cx="206" cy="212" r="112" fill="rgba(151,57,54,.12)" stroke="#973936" stroke-width="2.4"/><circle cx="206" cy="212" r="72" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.15)"/>${svgText(206, 182, theme.theme, { chars: 9, max: 4, size: 18, lineHeight: 19 })}<rect x="82" y="340" width="248" height="56" rx="22" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.14)"/>${svgText(206, 364, clip((lead && lead.headline) || theme.why || "材料整理中です。", 28), { chars: 18, max: 2, size: 14, lineHeight: 16 })}${processCards}${checkCards}</svg><p class="figureNote">中央を主役テーマ、その右を波及工程、下を今日確認したいトリガーとして一枚に置いています。</p></div>`;
    }

    function storyFigure(item, index, featured) {
      const accent = index % 2 === 0 ? { stroke: "#973936", fill: "rgba(151,57,54,.12)", soft: "rgba(151,57,54,.06)" } : { stroke: "#1d4162", fill: "rgba(29,65,98,.12)", soft: "rgba(29,65,98,.06)" };
      const width = 620;
      const height = featured ? 286 : 230;
      const themeLabel = clip(item.theme || category(item), 18);
      const actionLabel = clip(nextAction(item), 16);
      return `<div class="storyVisual"><svg viewBox="0 0 ${width} ${height}" role="img" aria-label="ニュースの論点図"><rect x="1" y="1" width="${width - 2}" height="${height - 2}" rx="28" fill="rgba(255,253,248,.98)" stroke="rgba(19,25,32,.12)"/><circle cx="${featured ? 110 : 92}" cy="${featured ? 88 : 76}" r="${featured ? 74 : 60}" fill="${accent.fill}"/><text x="${featured ? 110 : 92}" y="${featured ? 98 : 84}" text-anchor="middle" font-size="${featured ? 54 : 42}" font-weight="800" fill="rgba(19,25,32,.14)" font-family="Shippori Mincho, serif">0${index + 1}</text><rect x="${featured ? 200 : 164}" y="36" width="${featured ? 134 : 120}" height="30" rx="15" fill="${accent.fill}" stroke="${accent.stroke}"/>${svgText(featured ? 267 : 224, 56, label(item.source), { chars: 10, max: 1, size: 11 })}<path d="M${featured ? 144 : 120} ${featured ? 146 : 126} C${featured ? 208 : 182} ${featured ? 146 : 126}, ${featured ? 232 : 210} ${featured ? 146 : 126}, ${featured ? 282 : 250} ${featured ? 146 : 126}" fill="none" stroke="${accent.stroke}" stroke-width="3" stroke-linecap="round"/><rect x="${featured ? 282 : 250}" y="${featured ? 122 : 104}" width="${featured ? 194 : 164}" height="${featured ? 48 : 42}" rx="21" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.12)"/>${svgText(featured ? 379 : 332, featured ? 144 : 126, themeLabel, { chars: 12, max: 1, size: featured ? 14 : 13 })}<rect x="${featured ? 468 : 428}" y="${featured ? 122 : 104}" width="${featured ? 118 : 106}" height="${featured ? 48 : 42}" rx="21" fill="${accent.soft}" stroke="${accent.stroke}"/>${svgText(featured ? 527 : 481, featured ? 144 : 126, actionLabel, { chars: 10, max: 2, size: 12, lineHeight: 13 })}<rect x="36" y="${featured ? 198 : 160}" width="${width - 72}" height="${featured ? 58 : 50}" rx="25" fill="rgba(255,253,248,.92)" stroke="rgba(19,25,32,.12)"/>${svgText(width / 2, featured ? 222 : 190, clip(category(item), 20), { chars: 14, max: 1, size: featured ? 15 : 14 })}</svg></div>`;
    }

    function themeFigure(themes) {
      if (!themes.length) return `<div class="empty">テーマがまだありません。</div>`;
      const positions = [[148, 122], [596, 116], [180, 336], [564, 324]];
      const maxMention = Math.max(...themes.map((item) => item.mention), 1);
      const nodes = themes.slice(0, 4).map((item, index) => {
        const [x, y] = positions[index];
        const radius = 48 + Math.round((item.mention / maxMention) * 24);
        const tone = index % 2 === 0 ? { stroke: "#973936", fill: "rgba(151,57,54,.12)" } : { stroke: "#1d4162", fill: "rgba(29,65,98,.12)" };
        return `<path d="M380 224 C${x + 24} 224, ${x} ${y}, ${x} ${y}" fill="none" stroke="${tone.stroke}" stroke-width="3" stroke-linecap="round"/><circle cx="${x}" cy="${y}" r="${radius}" fill="${tone.fill}" stroke="${tone.stroke}" stroke-width="2.2"/>${svgText(x, y - 8, item.theme, { chars: 9, max: 3, size: 14, lineHeight: 16 })}<rect x="${x - 36}" y="${y + radius - 4}" width="72" height="26" rx="13" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.12)"/><text x="${x}" y="${y + radius + 14}" text-anchor="middle" font-size="12" font-weight="700" fill="${tone.stroke}" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">${escapeHtml(`${item.mention}件`)}</text>`;
      }).join("");
      const bars = themes.slice(0, 4).map((item, index) => {
        const width = 118 + Math.round((item.mention / maxMention) * 78);
        const x = 54 + (index * 170);
        const tone = index % 2 === 0 ? "#973936" : "#1d4162";
        return `<rect x="${x}" y="404" width="${width}" height="18" rx="9" fill="${tone}" opacity="0.78"/><text x="${x}" y="398" font-size="12" fill="#67717d" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">${escapeHtml(clip(item.theme, 10))}</text>`;
      }).join("");
      return `<div class="figurePanel"><svg viewBox="0 0 760 450" role="img" aria-label="今日のテーマ相関図"><rect x="1" y="1" width="758" height="448" rx="34" fill="rgba(255,253,248,.98)" stroke="rgba(19,25,32,.14)"/><circle cx="380" cy="224" r="108" fill="rgba(19,25,32,.04)" stroke="rgba(19,25,32,.14)" stroke-dasharray="7 10"/><circle cx="380" cy="224" r="66" fill="rgba(255,253,248,.96)" stroke="#131920" stroke-width="1.8"/>${svgText(380, 212, "今日の", { chars: 6, max: 1, size: 15 })}${svgText(380, 232, "テーマ地図", { chars: 6, max: 1, size: 18 })}${nodes}${bars}</svg><p class="figureNote">円の大きさは言及量、下の帯は朝刊の中でどのテーマが前面に出ているかの強さです。</p></div>`;
    }

    function watchFigure(items) {
      if (!items.length) return `<div class="empty">候補がまだありません。0件日でも次の昇格条件を追うボードとして使います。</div>`;
      const dots = items.map((item, index) => {
        const confidence = Math.max(1, Math.min(5, +item.confidence || 3));
        const x = 132 + ((confidence - 1) * 116) + ((index % 2) * 8);
        const y = item.kind === "direct" ? 122 : item.kind === "associate" ? 214 : 304 - ((index % 2) * 10);
        const tone = item.kind === "direct" ? { stroke: "#973936", fill: "rgba(151,57,54,.14)", radius: 38 } : item.kind === "associate" ? { stroke: "#aa8450", fill: "rgba(170,132,80,.16)", radius: 34 } : { stroke: "#1d4162", fill: "rgba(29,65,98,.13)", radius: 30 };
        return `<circle cx="${x}" cy="${y}" r="${tone.radius}" fill="${tone.fill}" stroke="${tone.stroke}" stroke-width="2"/>${svgText(x, y - 5, item.code || item.name, { chars: 6, max: 1, size: 13, lineHeight: 15 })}${svgText(x, y + 16, clip(item.name, 7), { chars: 7, max: 1, size: 11, lineHeight: 12, weight: 500 })}`;
      }).join("");
      return `<div class="figurePanel"><svg viewBox="0 0 760 430" role="img" aria-label="候補のポジションマップ"><rect x="1" y="1" width="758" height="428" rx="34" fill="rgba(255,253,248,.98)" stroke="rgba(19,25,32,.14)"/><rect x="110" y="72" width="560" height="92" rx="28" fill="rgba(151,57,54,.06)"/><rect x="110" y="176" width="560" height="92" rx="28" fill="rgba(170,132,80,.08)"/><rect x="110" y="280" width="560" height="92" rx="28" fill="rgba(29,65,98,.06)"/><line x1="110" y1="372" x2="670" y2="372" stroke="rgba(19,25,32,.24)" stroke-width="1.8"/><line x1="110" y1="72" x2="110" y2="372" stroke="rgba(19,25,32,.24)" stroke-width="1.8"/><text x="102" y="122" text-anchor="end" font-size="12" fill="#67717d" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">即反応</text><text x="102" y="214" text-anchor="end" font-size="12" fill="#67717d" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">中継ぎ</text><text x="102" y="314" text-anchor="end" font-size="12" fill="#67717d" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">先回り</text><text x="390" y="404" text-anchor="middle" font-size="12" fill="#67717d" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">右ほど確度が高い</text>${dots}</svg><p class="figureNote">縦軸を時間軸、横軸を確度として置き、今すぐ追う候補と先回りで見る候補を分けています。</p></div>`;
    }

    function sourceFigure(buckets) {
      const evidence = buckets.evidence[0];
      const background = buckets.background[0];
      const hypothesis = buckets.hypothesis[0];
      return `<div class="figurePanel"><svg viewBox="0 0 760 470" role="img" aria-label="根拠源と背景源と仮説源の層"><rect x="1" y="1" width="758" height="468" rx="34" fill="rgba(255,253,248,.98)" stroke="rgba(19,25,32,.14)"/><path d="M68 116 C180 74, 520 74, 688 124 L688 196 C522 168, 206 176, 68 214 Z" fill="rgba(151,57,54,.13)" stroke="#973936" stroke-width="2"/><path d="M92 214 C214 182, 550 190, 678 234 L678 304 C532 280, 226 288, 92 324 Z" fill="rgba(170,132,80,.15)" stroke="#aa8450" stroke-width="2"/><path d="M118 318 C250 290, 562 304, 652 338 L652 408 C540 392, 278 394, 118 426 Z" fill="rgba(29,65,98,.12)" stroke="#1d4162" stroke-width="2"/><text x="136" y="138" font-size="26" font-weight="800" fill="#973936" font-family="Shippori Mincho, serif">根拠源</text><text x="160" y="236" font-size="26" font-weight="800" fill="#aa8450" font-family="Shippori Mincho, serif">背景源</text><text x="186" y="340" font-size="26" font-weight="800" fill="#1d4162" font-family="Shippori Mincho, serif">仮説源</text>${svgText(550, 136, evidence ? clip(evidence.headline, 24) : "主要ニュースなし", { chars: 16, max: 2, size: 14, lineHeight: 16 })}${svgText(540, 238, background ? clip(background.headline, 24) : "地合い整理中", { chars: 16, max: 2, size: 14, lineHeight: 16 })}${svgText(520, 342, hypothesis ? clip(hypothesis.headline, 24) : "仮説整理中", { chars: 16, max: 2, size: 14, lineHeight: 16 })}<rect x="72" y="54" width="120" height="36" rx="18" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.14)"/><rect x="72" y="152" width="120" height="36" rx="18" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.14)"/><rect x="72" y="254" width="120" height="36" rx="18" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.14)"/>${svgText(132, 77, `${buckets.evidence.length}件`, { chars: 10, max: 1, size: 13 })}${svgText(132, 175, `${buckets.background.length}件`, { chars: 10, max: 1, size: 13 })}${svgText(132, 277, `${buckets.hypothesis.length}件`, { chars: 10, max: 1, size: 13 })}</svg><p class="figureNote">根拠を上、地合いを中、仮説を下に積んで、判断の重さを見分けやすくしています。</p></div>`;
    }

    function zeroDayFigure(boards) {
      const sectors = boards.sectors.slice(0, 3);
      const processes = boards.processes.slice(0, 3);
      const checks = boards.checks.slice(0, 3);
      const cardColumn = (items, x, title, tone) => {
        const stroke = tone === "red" ? "#973936" : tone === "gold" ? "#aa8450" : "#1d4162";
        const fill = tone === "red" ? "rgba(151,57,54,.12)" : tone === "gold" ? "rgba(170,132,80,.16)" : "rgba(29,65,98,.12)";
        return `<rect x="${x}" y="60" width="180" height="52" rx="22" fill="${fill}" stroke="${stroke}"/><text x="${x + 90}" y="92" text-anchor="middle" font-size="20" font-weight="800" fill="${stroke}" font-family="Shippori Mincho, serif">${escapeHtml(title)}</text>${items.map((item, index) => `<rect x="${x}" y="${142 + (index * 82)}" width="180" height="50" rx="20" fill="rgba(255,253,248,.96)" stroke="rgba(19,25,32,.12)"/>${svgText(x + 90, 172 + (index * 82), item, { chars: 12, max: 2, size: 13, lineHeight: 14 })}`).join("")}`;
      };
      return `<div class="figurePanel"><svg viewBox="0 0 760 440" role="img" aria-label="0件日の確認フロー"><rect x="1" y="1" width="758" height="438" rx="34" fill="rgba(255,253,248,.98)" stroke="rgba(19,25,32,.14)"/>${cardColumn(sectors.length ? sectors : ["業種整理中"], 64, "注視業種", "red")}${cardColumn(processes.length ? processes : ["工程整理中"], 292, "注視工程", "gold")}${cardColumn(checks.length ? checks : ["次チェック整理中"], 520, "昇格条件", "navy")}<path d="M244 246 C268 246, 280 246, 292 246" fill="none" stroke="#aa8450" stroke-width="3.2" stroke-linecap="round"/><path d="M472 246 C494 246, 504 246, 520 246" fill="none" stroke="#1d4162" stroke-width="3.2" stroke-linecap="round"/></svg><p class="figureNote">材料が薄い日は、業種 → 工程 → 昇格条件の順で待ち伏せポイントを固定します。</p></div>`;
    }

    const toolbar = (data, context) => `<div class="toolbar"><div class="brand"><p class="eyebrow">GitHub Pages Morning Edition</p><h1>株クラ朝刊 Slides</h1><p>NotebookLM のように、見出しの束ではなく、図で要点が入る朝の slide deck に寄せています。</p></div><div class="toolbarMeta"><span class="meta">${escapeHtml(full(data.analysis_date))} JST</span><span class="meta">ニュース ${escapeHtml(context.news.length)} 件</span><span class="meta">テーマ ${escapeHtml(context.themes.length)} 件</span><a class="link" href="./latest-analysis-full.md" target="_blank" rel="noopener noreferrer">Markdown</a><a class="link" href="./latest-analysis-full.json" target="_blank" rel="noopener noreferrer">JSON</a></div></div>`;

    const themeNote = (item, index) => `<article class="noteCard" data-no="0${index + 1}" data-tone="${kindTone(index)}"><div class="noteHead"><div><p class="eyebrow">Theme ${index + 1}</p><h3 class="panelTitle">${escapeHtml(item.theme)}</h3></div><div class="mentionStat">${escapeHtml(item.mention)}</div></div><p class="bodyCopy">${escapeHtml(clip(item.why || "要点整理中です。", 92))}</p><div class="chips">${asArray(item.processes).slice(0, 3).map((process) => metaTag(process, index % 2 === 0 ? "redTag" : "navyTag")).join("")}</div>${asArray(item.news).length ? `<p class="miniCopy">参照: ${escapeHtml(clip(asArray(item.news)[0].headline, 46))}</p>` : `<p class="miniCopy">参照ニュース整理中</p>`}</article>`;

    const watchCard = (item) => {
      const tone = item.kind === "direct" ? "red" : item.kind === "associate" ? "gold" : "navy";
      const toneTag = item.kind === "direct" ? "redTag" : item.kind === "associate" ? "goldTag" : "navyTag";
      const labelText = item.kind === "direct" ? "本命" : item.kind === "associate" ? "中継ぎ" : "監視";
      const width = Math.max(12, Math.min(100, (+item.confidence || 0) * 20));
      return `<article class="watchCard" data-tone="${tone}"><div class="storyMeta">${metaTag(labelText, toneTag)}${metaTag(item.code || "code")}${metaTag(`確度 ${item.confidence || 0}`)}</div><strong>${escapeHtml(item.name)}</strong><p class="bodyCopy">${escapeHtml(clip(item.reason || item.chain || "つながり整理中です。", 88))}</p>${item.catalyst ? `<p class="miniCopy">昇格条件: ${escapeHtml(clip(item.catalyst, 56))}</p>` : ""}${item.risk ? `<p class="miniCopy">弱さ: ${escapeHtml(clip(item.risk, 52))}</p>` : ""}<div class="watchBar"><span style="width:${width}%"></span></div></article>`;
    };

    const sourceCard = (title, subtitle, items, tone) => `<section class="sourceCard" data-tone="${tone}"><div class="sourceHead"><div><p class="eyebrow">${escapeHtml(subtitle)}</p><h3 class="sourceTitle">${escapeHtml(title)}</h3></div><div class="mentionStat">${escapeHtml(items.length)}</div></div><div class="sourceItems">${items.length ? items.slice(0, 2).map((item) => `<article class="sourceItem"><div class="storyMeta">${metaTag(label(item.source), tone === "red" ? "redTag" : tone === "gold" ? "goldTag" : "navyTag")}${item.timestamp ? metaTag(jp(item.timestamp)) : ""}</div><strong>${item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(clip(item.headline, 44))}</a>` : escapeHtml(clip(item.headline, 44))}</strong><p class="miniCopy">${escapeHtml(clip(item.summary || item.theme || "整理中です。", 82))}</p></article>`).join("") : `<div class="empty">まだ並べる情報がありません。</div>`}</div></section>`;

    const storyPoster = (item, index, featured = false) => `<article class="storyPoster ${featured ? "featured" : ""}"><div class="storyMeta">${metaTag(`#${index + 1}`, "redTag")}${metaTag(label(item.source), index % 2 === 0 ? "redTag" : "navyTag")}${metaTag(category(item), item.role === "hypothesis" ? "navyTag" : "goldTag")}${item.timestamp ? metaTag(jp(item.timestamp)) : ""}</div>${storyFigure(item, index, featured)}<h3 class="storyTitle">${item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.headline)}</a>` : escapeHtml(item.headline)}</h3><p class="storySummary">${escapeHtml(clip(item.summary || item.why || "要点整理中です。", featured ? 118 : 90))}</p><div class="storyFlow">${metaTag(label(item.source), "redTag")}<span class="flowDot">→</span>${metaTag(clip(item.theme || category(item), 18), "navyTag")}<span class="flowDot">→</span>${metaTag(clip(nextAction(item), 18), "greenTag")}</div></article>`;

    function render(data) {
      const context = ctx(data);
      const topTheme = context.themes[0];
      const lead = context.news[0];
      const stories = context.news.slice(0, 3);
      const topWatch = context.watch[0];
      $("masthead").innerHTML = toolbar(data, context);
      $("deck").innerHTML = [
        `<section class="slide cover">${head("01", "Front Page", "今日の結論", "一枚目はニュースの要点ではなく、ニュースがどこへ波及するかを一枚絵で掴む面です。")}<div class="heroLayout"><section class="leadPanel"><p class="eyebrow">Morning Thesis</p><h3 class="heroHeadline">${escapeHtml(topTheme ? topTheme.theme : "材料整理中")}</h3><p class="heroSentence">${escapeHtml(clip((lead && `${lead.headline}。${lead.summary || lead.why}`) || data.market_sentiment || (topTheme && topTheme.why) || "ニュースの要点を整理中です。", 124))}</p><div class="tagRow">${topTheme ? metaTag(topTheme.theme, "redTag") : ""}${lead ? metaTag(label(lead.source), "navyTag") : ""}${topWatch ? metaTag(`${topWatch.code} ${topWatch.name}`, "greenTag") : ""}${context.boards.checks[0] ? metaTag(clip(context.boards.checks[0], 18), "goldTag") : ""}</div><div class="heroTicker"><article class="tickerCard"><p class="eyebrow">Lead Story</p><strong>${escapeHtml(clip((lead && lead.headline) || "主要ニュース整理中", 42))}</strong></article><article class="tickerCard"><p class="eyebrow">Next Watch</p><strong>${escapeHtml(clip((topWatch && (topWatch.catalyst || topWatch.reason)) || "次の昇格条件を整理中です。", 40))}</strong></article></div><div class="factStrip"><article class="factCard"><span>主役テーマ</span><strong>${escapeHtml(context.themes.length)}</strong></article><article class="factCard"><span>監視候補</span><strong>${escapeHtml(context.watch.length)}</strong></article><article class="factCard"><span>確認トリガー</span><strong>${escapeHtml(context.boards.checks.length)}</strong></article></div><div class="heroAgenda"><p class="eyebrow">Why It Matters</p><strong>${escapeHtml(lead ? clip(lead.headline, 34) : "材料整理中")}</strong><p class="bodyCopy">${escapeHtml(clip((topTheme && topTheme.why) || (lead && lead.summary) || "ここは朝の一言メモを置く場所です。", 88))}</p></div></section><div>${heroFigure(topTheme, lead, context.boards, context.watch)}</div></div></section>`,
        `<section class="slide red">${head("02", "News Storyboard", "主要ニュース", "見出しの羅列ではなく、起点から次に見るポイントまでをポスターのように並べています。")}${stories.length ? `<div class="storiesLayout"><div>${storyPoster(stories[0], 0, true)}</div><div class="storyStack">${stories.slice(1).map((item, index) => storyPoster(item, index + 1)).join("")}</div></div>` : `<div class="empty">表示できるニュースがありません。</div>`}</section>`,
        `<section class="slide ink">${head("03", "Theme Atlas", "今日の市場地図", "何が主役で、どこへ波及するかを 4 テーマ以内に圧縮して、右側に注釈カードを添えています。")}<div class="themeLayout"><div>${themeFigure(context.themes)}</div><div class="themeNotes">${context.themes.length ? context.themes.map(themeNote).join("") : `<div class="empty">テーマがまだありません。</div>`}</div></div></section>`,
        `<section class="slide green">${head("04", "Watch Board", "本命候補 / 監視候補", "確度と時間軸で置き直し、いま見る候補と先回りで見る候補を分けています。")}<div class="watchLayout"><div>${watchFigure(context.watch)}</div><div class="watchStack">${context.watch.length ? context.watch.map(watchCard).join("") : `<div class="empty">候補がまだありません。</div>`}</div></div></section>`,
        `<section class="slide ink">${head("05", "Source Layers", "根拠源 / 背景源 / 仮説源", "ニュースの重さを見分けるために、判断の土台・地合い・仮説を別の層として見せています。")}<div class="sourceLayout"><div>${sourceFigure(context.buckets)}</div><div class="sourceShelf">${sourceCard("根拠源", "Primary", context.buckets.evidence, "red")}${sourceCard("背景源", "Backdrop", context.buckets.background, "gold")}${sourceCard("仮説源", "Hypothesis", context.buckets.hypothesis, "navy")}</div></div></section>`,
        `<section class="slide cover">${head("06", "Zero-Day Board", "0件日でも見るボード", "材料が薄い日でも、注視業種・工程・昇格条件の順で待ち伏せできるようにしています。")}<div class="zeroLayout"><div>${zeroDayFigure(context.boards)}</div><div class="boardStack"><section class="miniBoard"><p class="eyebrow">Watch Sectors</p><h3 class="boardTitle">注視業種 / 注視工程</h3><div class="chipWall">${context.boards.sectors.length ? context.boards.sectors.map((item) => metaTag(item, "redTag")).join("") : metaTag("業種整理中")}</div><div class="chipWall">${context.boards.processes.length ? context.boards.processes.map((item) => metaTag(item, "navyTag")).join("") : metaTag("工程整理中")}</div><p class="miniCopy">テーマが 0 件の日でも、この面だけで次の昇格条件を追跡できます。</p></section><section class="miniBoard"><p class="eyebrow">Promotion Checks</p><h3 class="boardTitle">昇格条件 / 次に確認</h3><div class="sourceItems">${context.boards.checks.length ? context.boards.checks.slice(0, 4).map((item, index) => `<article class="sourceItem">${metaTag(`Check ${index + 1}`, index % 2 === 0 ? "redTag" : "navyTag")}<strong>${escapeHtml(item)}</strong></article>`).join("") : `<div class="empty">次チェック整理中</div>`}</div><div class="footerLinks"><a class="link" href="./latest-analysis-full.md" target="_blank" rel="noopener noreferrer">Markdown を開く</a><a class="link" href="./latest-analysis-full.json" target="_blank" rel="noopener noreferrer">JSON を開く</a></div></section></div></div></section>`
      ].join("");
      $("footer").innerHTML = `最終更新: ${escapeHtml(full(data.analysis_date))} JST / 公開ファイル: latest-analysis-full.md / latest-analysis-full.json`;
    }

    fetch("./latest-analysis-full.json", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then(render)
      .catch((error) => {
        $("masthead").innerHTML = "";
        $("deck").innerHTML = `<div class="error">latest-analysis-full.json の読み込みに失敗しました: ${escapeHtml(error.message)}</div>`;
        $("footer").innerHTML = "";
      });
  </script>
</body>
</html>
