      return`<div class="visual"><svg viewBox="0 0 600 390" role="img" aria-label="今日の市場地図"><rect x="1" y="1" width="598" height="388" rx="28" fill="rgba(255,253,247,.96)" stroke="rgba(16,22,27,.14)"/><circle cx="300" cy="192" r="78" fill="rgba(16,22,27,.04)" stroke="rgba(16,22,27,.14)" stroke-dasharray="5 8"/><circle cx="300" cy="192" r="50" fill="rgba(255,253,247,.96)" stroke="#10161b" stroke-width="1.8"/>${svgText(300,181,"今日の",{c:6,m:1,s:14,h:16})}${svgText(300,201,"市場地図",{c:6,m:1,s:16,h:18})}${nodes}</svg><p class="caption">円の大きさは言及量、線は今日つながって見える論点です。</p></div>`;
    }
    const storyMini=(x,i)=>{const stroke=i%2===0?"#8f3432":"#1f405f",fill=i%2===0?"rgba(143,52,50,.12)":"rgba(31,64,95,.12)";return`<div class="miniGraphic"><svg viewBox="0 0 320 120" role="img" aria-label="ニュースの関係図"><rect x="1" y="1" width="318" height="118" rx="20" fill="rgba(255,253,247,.96)" stroke="rgba(20,25,31,.12)"/><rect x="18" y="20" width="72" height="24" rx="12" fill="${fill}" stroke="${stroke}"/>${svgText(54,37,label(x.source),{c:8,m:1,s:11})}<path d="M92 32 C122 32, 134 32, 160 32" fill="none" stroke="${stroke}" stroke-width="2.4" stroke-linecap="round"/><rect x="160" y="18" width="140" height="28" rx="14" fill="rgba(255,253,247,.94)" stroke="rgba(20,25,31,.12)"/>${svgText(230,36,x.theme||cat(x),{c:13,m:1,s:11})}<rect x="20" y="62" width="132" height="34" rx="17" fill="rgba(255,253,247,.94)" stroke="rgba(20,25,31,.12)"/>${svgText(86,83,cat(x),{c:10,m:1,s:11})}<rect x="168" y="62" width="132" height="34" rx="17" fill="rgba(255,253,247,.94)" stroke="rgba(20,25,31,.12)"/>${svgText(234,83,action(x),{c:12,m:1,s:11})}</svg></div>`};
    function watchSvg(items){
      if(!items.length)return`<div class="empty">候補がまだありません。0件日でも次の昇格条件を追うボードとして使います。</div>`;
      const dots=items.map((x,i)=>{const conf=Math.max(1,Math.min(5,+x.confidence||3)),px=110+(conf-1)*104+(i%2)*8,py=x.kind==="direct"?118:x.kind==="associate"?198:286-(i%2)*12,c=x.kind==="direct"?"#8a2c2c":x.kind==="associate"?"#ae8440":"#1a3954",f=x.kind==="direct"?"rgba(138,44,44,.14)":x.kind==="associate"?"rgba(174,132,64,.15)":"rgba(26,57,84,.12)",r=x.kind==="direct"?36:x.kind==="associate"?32:28;return`<circle cx="${px}" cy="${py}" r="${r}" fill="${f}" stroke="${c}" stroke-width="2"/>${svgText(px,py-4,x.code||x.name,{c:6,m:1,s:13,h:15})}${svgText(px,py+14,clip(x.name,7),{c:7,m:1,s:11,h:12,w:500})}`}).join("");
      return`<div class="matrix"><svg viewBox="0 0 600 380" role="img" aria-label="候補のポジションマップ"><rect x="1" y="1" width="598" height="378" rx="28" fill="rgba(255,253,247,.96)" stroke="rgba(16,22,27,.14)"/><line x1="86" y1="320" x2="542" y2="320" stroke="rgba(16,22,27,.25)" stroke-width="1.6"/><line x1="86" y1="66" x2="86" y2="320" stroke="rgba(16,22,27,.25)" stroke-width="1.6"/><text x="82" y="98" text-anchor="end" font-size="12" fill="#5e6872" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">即反応</text><text x="82" y="206" text-anchor="end" font-size="12" fill="#5e6872" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">中継ぎ</text><text x="82" y="298" text-anchor="end" font-size="12" fill="#5e6872" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">先回り</text><text x="314" y="364" text-anchor="middle" font-size="12" fill="#5e6872" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">右ほど確度が高い</text>${dots}</svg><p class="caption">横軸は確度、縦軸は今すぐ反応するか先回りかをざっくり置いています。</p></div>`;
    }
    const bridgeSvg=()=>`<div class="bridge"><svg viewBox="0 0 1200 110" role="img" aria-label="情報レイヤーの関係"><rect x="1" y="1" width="1198" height="108" rx="28" fill="rgba(255,253,247,.56)" stroke="rgba(16,22,27,.1)"/><rect x="70" y="28" width="220" height="54" rx="22" fill="rgba(138,44,44,.12)" stroke="#8a2c2c"/><text x="180" y="61" text-anchor="middle" font-size="18" font-weight="700" fill="#8a2c2c" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">根拠源</text><path d="M290 55 C388 55, 416 55, 510 55" fill="none" stroke="#ae8440" stroke-width="3" stroke-linecap="round"/><rect x="510" y="28" width="220" height="54" rx="22" fill="rgba(174,132,64,.14)" stroke="#ae8440"/><text x="620" y="61" text-anchor="middle" font-size="18" font-weight="700" fill="#ae8440" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">背景源</text><path d="M730 55 C826 55, 854 55, 948 55" fill="none" stroke="#1a3954" stroke-width="3" stroke-linecap="round"/><rect x="948" y="28" width="180" height="54" rx="22" fill="rgba(26,57,84,.12)" stroke="#1a3954"/><text x="1038" y="61" text-anchor="middle" font-size="18" font-weight="700" fill="#1a3954" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">仮説源</text></svg></div>`;
    const toolbar=(d,c)=>`<div class="toolbar"><div class="brand"><p class="eyebrow">GitHub Pages Morning Edition</p><h1>株クラ朝刊 Slides</h1><p>NotebookLM のように、短文と図で読む朝の slide deck に切り替えています。</p></div><div class="toolbar-meta"><span class="meta">${e(full(d.analysis_date))} JST</span><span class="meta">ニュース ${e(c.news.length)} 件</span><span class="meta">テーマ ${e(c.themes.length)} 件</span><a class="link" href="./latest-analysis-full.md" target="_blank" rel="noopener noreferrer">Markdown</a><a class="link" href="./latest-analysis-full.json" target="_blank" rel="noopener noreferrer">JSON</a></div></div>`;
    const insight=(k,v,note,t)=>`<article class="card insight ${t}"><p class="eyebrow">${e(k)}</p><strong>${e(v)}</strong>${note?`<p class="body">${e(note)}</p>`:""}</article>`;
    const themeCard=(x,i)=>`<article class="themeCard" data-no="0${i+1}"><div class="tags"><span class="tag ${i%2===0?"redTag":"navyTag"}">Theme ${i+1}</span><span class="tag ${x.kind==="investable"?"greenTag":"goldTag"}">${e(x.kind==="investable"?"本命テーマ":"背景テーマ")}</span><span class="tag">${e(`${x.mention}件`)}</span></div><strong style="display:block;margin-top:12px;max-width:15ch;">${e(x.theme)}</strong><p class="body" style="max-width:30ch;">${e(clip(x.why||"要点整理中",86))}</p><div class="chips" style="margin-top:14px;">${a(x.processes).slice(0,3).map(p=>`<span class="chip ${i%2===0?"redTag":"navyTag"}">${e(p)}</span>`).join("")}</div>${a(x.news).length?`<p class="small" style="margin-top:16px;">参照: ${e(clip(a(x.news)[0].headline,42))}</p>`:`<p class="small" style="margin-top:16px;">参照ニュース整理中</p>`}</article>`;
    const storyCard=(x,i,f=false)=>`<article class="storyCard ${f?"feature":""}"><div class="storyHead"><span class="storyIndex">#${i+1}</span><span class="tag redTag">${e(label(x.source))}</span><span class="tag ${x.role==="hypothesis"?"navyTag":"goldTag"}">${e(cat(x))}</span>${x.timestamp?`<span class="tag">${e(jp(x.timestamp))}</span>`:""}</div><h3 class="storyTitle">${x.url?`<a href="${e(x.url)}" target="_blank" rel="noopener noreferrer">${e(x.headline)}</a>`:e(x.headline)}</h3><p class="summary">${e(clip(x.summary||x.why||"要点整理中",f?118:84))}</p>${storyMini(x,i)}<div class="flow"><span class="chip redTag">${e(label(x.source))}</span><span class="dot">→</span><span class="chip navyTag">${e(clip(x.theme||cat(x),18))}</span><span class="dot">→</span><span class="chip greenTag">${e(action(x))}</span></div></article>`;
    const cand=(x)=>{const w=Math.max(12,Math.min(100,(+x.confidence||0)*20)),k=x.kind==="direct"?"redTag":x.kind==="associate"?"goldTag":"navyTag",m=x.kind==="direct"?"本命":x.kind==="associate"?"中継ぎ":"監視",kindClass=x.kind==="direct"?"watchDirect":x.kind==="associate"?"watchAssociate":"watchWatch";return`<article class="cand ${kindClass}"><div class="candHead"><span class="tag ${k}">${e(m)}</span><span class="tag">${e(x.code)}</span><span class="tag">確度 ${e(x.confidence||0)}</span></div><strong style="display:block;margin-top:12px;">${e(x.name)}</strong><p class="body">${e(clip(x.reason||x.chain||"つながり整理中",84))}</p>${x.catalyst?`<p class="small" style="margin-top:10px;">昇格条件: ${e(clip(x.catalyst,50))}</p>`:""}${x.risk?`<p class="small">弱さ: ${e(clip(x.risk,46))}</p>`:""}<div class="bar"><span style="width:${w}%"></span></div></article>`};
    const column=(title,sub,items,tone)=>`<section class="col ${tone==="redTag"?"sourceRed":tone==="goldTag"?"sourceGold":"sourceNavy"}"><p class="eyebrow">${e(sub)}</p><h3>${e(title)}</h3><div class="layerStack">${items.length?items.map(x=>`<article class="layerCard" style="border:1px solid var(--line);background:rgba(255,253,247,.92)"><div class="layerHead"><span class="tag ${tone}">${e(label(x.source))}</span>${x.timestamp?`<span class="tag">${e(jp(x.timestamp))}</span>`:""}</div><strong style="display:block;margin-top:10px;">${x.url?`<a href="${e(x.url)}" target="_blank" rel="noopener noreferrer">${e(clip(x.headline,42))}</a>`:e(clip(x.headline,42))}</strong><p class="small">${e(clip(x.summary||x.theme||"整理中",72))}</p></article>`).join(""):`<div class="empty">まだ並べる情報がありません。</div>`}</div></section>`;
    const check=(x,i)=>`<article class="card"><span class="tag ${i%2===0?"redTag":"navyTag"}">Check ${i+1}</span><strong style="display:block;margin-top:10px;">${e(x)}</strong></article>`;
    function render(data){
      const c=ctx(data),t=c.themes[0],lead=c.news[0],news=c.news.slice(0,3);
      $("masthead").innerHTML=toolbar(data,c);
      $("deck").innerHTML=[
        `<section class="slide cover">${head("01","Front Page","今日の結論","一枚目だけで、今日の読み筋と監視候補がつかめるようにしています。")}<div class="grid"><div><div class="quote"><p class="eyebrow">Today in one sentence</p><h3>${e(clip(data.market_sentiment||(t?t.why:"材料整理中です。"),92))}</h3></div><div class="metrics"><article class="metric"><span>主役テーマ</span><strong>${e(c.themes.length)}</strong></article><article class="metric"><span>監視候補</span><strong>${e(c.watch.length)}</strong></article><article class="metric"><span>確認トリガー</span><strong>${e(c.boards.checks.length)}</strong></article></div><div class="insights">${insight("主役テーマ",t?t.theme:"整理中",t?clip(t.why,62):"テーマ取得待ち","toneR")}${insight("主役ニュース",lead?clip(lead.headline,28):"整理中",lead?clip(lead.summary||lead.why,62):"ニュース取得待ち","toneN")}${insight("注視候補",c.watch[0]?`${c.watch[0].code} ${c.watch[0].name}`:"候補なし",c.watch[0]?clip(c.watch[0].catalyst||c.watch[0].reason,62):"0件日は昇格条件を追跡","toneG")}</div></div><div>${heroSvg(t,lead,c.boards,c.watch)}</div></div></section>`,
        `<section class="slide ink">${head("02","Theme Atlas","今日の市場地図","何が主役で、どこへ波及するかを 4 テーマ以内に圧縮しています。")}<div class="grid"><div>${themeSvg(c.themes)}</div><div class="themeGrid">${c.themes.length?c.themes.map(themeCard).join(""):`<div class="empty">テーマがまだありません。</div>`}</div></div></section>`,
        `<section class="slide red">${head("03","News Storyboard","主要ニュース","見出し一覧ではなく、起点から次に見るポイントまでを 1 ニュース 1 スライド感で並べています。")}${news.length?`<div class="storyGrid"><div>${storyCard(news[0],0,true)}</div><div class="stack">${news.slice(1).map((x,i)=>storyCard(x,i+1)).join("")}</div></div>`:`<div class="empty">表示できるニュースがありません。</div>`}</section>`,
        `<section class="slide green">${head("04","Watch Board","本命候補 / 監視候補","確度と時間軸で置き直し、いま見る候補と先回りで見る候補を分けています。")}<div class="watchGrid"><div>${watchSvg(c.watch)}</div><div class="stack">${c.watch.length?c.watch.map(cand).join(""):`<div class="empty">候補がまだありません。</div>`}</div></div></section>`,
        `<section class="slide ink">${head("05","Source Layers","根拠源 / 背景源 / 仮説源","どの材料を判断の土台にして、何を地合いとして扱い、何を仮説に留めるかを分離しています。")}${bridgeSvg()}<div class="layers">${column("根拠源","Primary",c.buckets.evidence,"redTag")}${column("背景源","Backdrop",c.buckets.background,"goldTag")}${column("仮説源","Hypothesis",c.buckets.hypothesis,"navyTag")}</div></section>`,
        `<section class="slide cover">${head("06","Zero-Day Board","0件日でも見るボード","候補が薄い日でも、注視業種・工程・昇格条件までを一枚に置いて次の材料を待てるようにしています。")}<div class="decisionGrid"><section class="board"><p class="eyebrow">Watch Sectors</p><h3>注視業種 / 注視工程</h3><div class="chips" style="margin-top:16px;">${c.boards.sectors.length?c.boards.sectors.map(x=>`<span class="chip redTag">${e(x)}</span>`).join(""):'<span class="chip">業種整理中</span>'}</div><div class="chips" style="margin-top:14px;">${c.boards.processes.length?c.boards.processes.map(x=>`<span class="chip navyTag">${e(x)}</span>`).join(""):'<span class="chip">工程整理中</span>'}</div><p class="small" style="margin-top:18px;">テーマが 0 件の日でも、このボードだけで次の昇格条件を追跡できます。</p></section><section class="board"><p class="eyebrow">Promotion Checks</p><h3>昇格条件 / 次に確認</h3><div class="checks">${c.boards.checks.length?c.boards.checks.map(check).join(""):'<div class="empty">次チェック整理中</div>'}</div><div class="footer-links"><a class="link" href="./latest-analysis-full.md" target="_blank" rel="noopener noreferrer">Markdown を開く</a><a class="link" href="./latest-analysis-full.json" target="_blank" rel="noopener noreferrer">JSON を開く</a></div></section></div></section>`
      ].join("");
      $("footer").innerHTML=`最終更新: ${e(full(data.analysis_date))} JST / 公開ファイル: latest-analysis-full.md / latest-analysis-full.json`;
    }
    fetch("./latest-analysis-full.json",{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}).then(render).catch(err=>{$("masthead").innerHTML="";$("deck").innerHTML=`<div class="error">latest-analysis-full.json の読み込みに失敗しました: ${e(err.message)}</div>`;$("footer").innerHTML=""});
  </script>
</body>
</html>
