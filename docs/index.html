<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>株クラ朝刊</title>
  <style>
    :root {
      --bg: #f6f2ea;
      --paper: #fffdf8;
      --ink: #171b20;
      --muted: #5f6770;
      --line: rgba(23, 27, 32, 0.14);
      --line-strong: rgba(23, 27, 32, 0.34);
      --accent: #9b1c1c;
      --accent-soft: rgba(155, 28, 28, 0.08);
      --navy: #1d3e63;
      --navy-soft: rgba(29, 62, 99, 0.08);
      --green: #2f5c50;
      --green-soft: rgba(47, 92, 80, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "BIZ UDPGothic", "Yu Gothic", sans-serif;
    }

    .page {
      max-width: 1160px;
      margin: 0 auto;
      padding: 12px 12px 32px;
    }

    .sheet {
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 18px 44px rgba(49, 40, 28, 0.09);
    }

    .masthead,
    .section {
      padding: 18px 20px;
    }

    .masthead {
      border-bottom: 3px double var(--line-strong);
    }

    .section + .section {
      border-top: 1px solid var(--line);
    }

    .topline,
    .meta-row,
    .badge-row,
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }

    .topline {
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .label {
      margin: 0;
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 700;
    }

    h1, h2, h3, h4 {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      line-height: 1.3;
    }

    h1 {
      text-align: center;
      font-size: clamp(34px, 6vw, 56px);
      letter-spacing: 0.08em;
    }

    h2 { font-size: 28px; }
    h3 { font-size: 22px; }
    h4 { font-size: 18px; }

    p {
      margin: 0;
      line-height: 1.8;
    }

    .sub,
    .body,
    .small {
      color: var(--muted);
    }

    .sub {
      margin-top: 8px;
      text-align: center;
      font-size: 15px;
    }

    .small {
      font-size: 13px;
    }

    .navline {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px 14px;
      align-items: flex-end;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--ink);
    }

    .desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(23, 27, 32, 0.06);
    }

    .red { background: var(--accent-soft); color: var(--accent); }
    .navy { background: var(--navy-soft); color: var(--navy); }
    .green { background: var(--green-soft); color: var(--green); }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(300px, 0.9fr);
      gap: 18px;
    }

    .brief-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 16px;
    }

    .signal-stack,
    .flow-stack {
      display: grid;
      gap: 12px;
    }

    .card,
    .story,
    .memo,
    .theme-box {
      border: 1px solid var(--line);
      background: var(--paper);
      padding: 16px 18px;
    }

    .lead {
      margin-top: 12px;
      font-size: 19px;
      line-height: 1.9;
    }

    .highlight {
      margin-top: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(155, 28, 28, 0.05), rgba(155, 28, 28, 0.01));
    }

    .art-shell,
    .atlas-shell,
    .flow-art {
      margin-top: 16px;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .art-shell {
      padding: 12px;
      background: radial-gradient(circle at top left, rgba(155, 28, 28, 0.18), rgba(255, 253, 248, 0.94) 48%);
    }

    .atlas-shell {
      margin-top: 14px;
      padding: 12px;
      background: radial-gradient(circle at center, rgba(29, 62, 99, 0.14), rgba(255, 253, 248, 0.98) 55%);
    }

    .flow-art {
      padding: 10px;
      background: linear-gradient(180deg, rgba(47, 92, 80, 0.15), rgba(255, 253, 248, 0.98));
    }

    .art-shell svg,
    .atlas-shell svg,
    .flow-art svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .art-caption {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .story p,
    .memo p,
    .theme-box p {
      margin-top: 10px;
    }

    .signal-card,
    .flow-card {
      border: 1px solid var(--line);
      padding: 16px 18px;
    }

    .signal-card {
      background: linear-gradient(180deg, rgba(29, 62, 99, 0.08), rgba(255, 253, 248, 0.96));
    }

    .flow-card {
      background: linear-gradient(180deg, rgba(47, 92, 80, 0.1), rgba(255, 253, 248, 0.96));
    }

    .signal-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px 14px;
      align-items: flex-start;
    }

    .legend-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .legend-card {
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.95);
      padding: 10px 12px;
    }

    .meter {
      margin-top: 12px;
      height: 8px;
      border-radius: 999px;
      background: rgba(23, 27, 32, 0.08);
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--navy));
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .mini-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(23, 27, 32, 0.06);
    }

    .flow-lane {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .flow-node {
      min-width: 110px;
      max-width: 230px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--paper);
      line-height: 1.6;
    }

    .flow-arrow {
      color: var(--accent);
      font-weight: 700;
      font-size: 18px;
    }

    .story-list,
    .theme-grid,
    .source-grid,
    .two-col {
      display: grid;
      gap: 16px;
    }

    .theme-grid,
    .two-col {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .story-list {
      gap: 16px;
    }

    .story-item {
      padding: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 253, 248, 0.99), rgba(246, 242, 234, 0.9));
    }

    .story-poster {
      display: grid;
      grid-template-columns: minmax(0, 280px) 1fr;
      gap: 18px;
      align-items: center;
    }

    .story-scene {
      border: 1px solid var(--line);
      overflow: hidden;
      background: radial-gradient(circle at top left, rgba(29, 62, 99, 0.15), rgba(255, 253, 248, 0.98) 54%);
    }

    .story-scene svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .story-copy {
      display: grid;
      gap: 10px;
    }

    .story-ribbon {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .story-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 1px solid rgba(23, 27, 32, 0.14);
      background: rgba(255, 253, 248, 0.92);
      font-size: 12px;
      color: var(--muted);
    }

    .story-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .ref-list {
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .ref-item {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      align-items: flex-start;
      line-height: 1.7;
    }

    .ref-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(29, 62, 99, 0.25);
      color: var(--navy);
      background: var(--navy-soft);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .ref-chip:hover {
      border-color: var(--navy);
    }

    .svg-eyebrow {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .story-link {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(29, 62, 99, 0.25);
    }

    .story-link:hover {
      color: var(--navy);
      border-bottom-color: var(--navy);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    ul {
      margin: 12px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    .mono {
      font-family: ui-monospace, "Cascadia Code", monospace;
      font-size: 12px;
    }

    .empty,
    .loading,
    .error {
      padding: 14px 16px;
      border: 1px dashed var(--line-strong);
      background: rgba(23, 27, 32, 0.02);
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 980px) {
      .hero,
      .brief-grid,
      .legend-grid,
      .story-poster,
      .theme-grid,
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .page { padding: 8px 8px 24px; }
      .masthead, .section { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="sheet">
      <header class="masthead" id="masthead">
        <div class="loading">朝刊を読み込んでいます。</div>
      </header>

      <section class="section" id="front"></section>
      <section class="section" id="briefing"></section>
      <section class="section" id="top-news"></section>
      <section class="section" id="theme-news"></section>
      <section class="section" id="source-desk"></section>
      <section class="section" id="stock-memo"></section>
      <section class="section" id="zero-day"></section>
      <section class="section" id="footer"></section>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const arr = (v) => Array.isArray(v) ? v : [];
    const safe = (v, d = "情報なし") => v == null || v === "" ? d : String(v);
    const esc = (v) => safe(v, "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    const clip = (v, n = 120) => { const t = safe(v, ""); return t.length > n ? `${t.slice(0, n - 1)}…` : t; };
    const norm = (v) => safe(v, "").toLowerCase().replace(/\s+/g, "").replace(/[【】［］\[\]（）()＜＞<>「」『』・:：!！?？,，.。/]/g, "");
    const uniq = (items, keyOf) => {
      const seen = new Set();
      return (items || []).filter((item) => {
        const key = keyOf(item);
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    };
    const jpTime = (v) => {
      const d = new Date(v || "");
      return Number.isNaN(d.getTime())
        ? safe(v, "日時不明")
        : new Intl.DateTimeFormat("ja-JP", {
            timeZone: "Asia/Tokyo",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          }).format(d);
    };
    const sourceLabel = (v) => ({ x: "X", kabutan: "株探", minkabu: "みんかぶ", yahoo: "Yahoo" }[v] || safe(v, "source"));

    function edition(data) {
      const direct = arr(data.direct_picks);
      const assoc = arr(data.associative_picks || data.stock_picks);
      const watch = arr(data.watch_candidates);
      if (direct.length + assoc.length > 0) return "本命候補号";
      if (watch.length > 0) return "監視強化号";
      if (arr(data.sector_watch).length + arr(data.process_watch).length > 0) return "0件日運用号";
      return "背景整理号";
    }

    function collectNews(data) {
      const seeded = [];
      const pushTheme = (themes, role) => arr(themes).forEach((theme) => {
        arr(theme.news_items).forEach((item, index) => {
          seeded.push({
            theme: theme.theme,
            source: item.source,
            headline: item.headline,
            summary: item.summary,
            url: item.url,
            timestamp: item.timestamp,
            why: theme.why_it_matters,
            processes: arr(theme.beneficiary_processes),
            role,
            order: index,
          });
        });
      });
      pushTheme(data.investable_themes, "investable");
      pushTheme(data.market_backdrop, "backdrop");
      pushTheme(data.trending_themes, "theme");

      return uniq(
        seeded.sort((a, b) => {
          const rank = (role) => role === "investable" ? 3 : role === "backdrop" ? 2 : 1;
          const rankDiff = rank(b.role) - rank(a.role);
          if (rankDiff !== 0) return rankDiff;
          const timeDiff = new Date(b.timestamp || 0).getTime() - new Date(a.timestamp || 0).getTime();
          if (timeDiff !== 0) return timeDiff;
          return a.order - b.order;
        }),
        (item) => safe(item.url, "").trim() || `${norm(item.theme)}|${norm(item.headline)}`
      );
    }

    function newsKey(item) {
      return safe(item?.url, "").trim() || `${safe(item?.source, "")}|${norm(item?.theme)}|${norm(item?.headline)}`;
    }

    function buildNewsIndex(items) {
      return new Map(arr(items).map((item, index) => [newsKey(item), index + 1]));
    }

    function storyRefNumber(item, newsIndex) {
      return newsIndex.get(newsKey(item)) || null;
    }

    function renderStoryRefList(items, newsIndex, emptyText = "関連ニュース参照はまだありません。") {
      const refs = uniq(
        arr(items)
          .map((item) => ({ item, number: storyRefNumber(item, newsIndex) }))
          .filter((entry) => entry.number),
        (entry) => `${entry.number}`
      ).slice(0, 3);

      if (!refs.length) return `<div class="small">${esc(emptyText)}</div>`;

      return `
        <ul class="ref-list">
          ${refs.map(({ item, number }) => `
            <li class="ref-item">
              <a class="ref-chip" href="#story-${number}">#${number}</a>
              <span>${esc(clip(item.headline, 58))}</span>
            </li>
          `).join("")}
        </ul>
      `;
    }

    function renderDeskNotes(items, newsIndex, emptyText) {
      const notes = arr(items).slice(0, 6).map((item) => {
        const refNumber = storyRefNumber(item, newsIndex);
        const reference = refNumber
          ? `<a class="ref-chip" href="#story-${refNumber}">#${refNumber}</a>`
          : `<span class="small">${esc(clip(item.headline, 58))}</span>`;
        const meta = [safe(item.theme, "関連テーマなし"), sourceLabel(item.source)]
          .filter(Boolean)
          .join(" / ");
        return `
          <li class="ref-item">
            ${reference}
            <span>${esc(meta)}</span>
          </li>
        `;
      });

      return notes.length
        ? `<ul class="ref-list">${notes.join("")}</ul>`
        : `<div class="empty">${esc(emptyText)}</div>`;
    }

    function wrapSvgLines(text, charsPerLine = 12, maxLines = 3) {
      const source = safe(text, "");
      if (!source) return [];
      const chars = Array.from(source);
      const lines = [];
      while (chars.length && lines.length < maxLines) {
        lines.push(chars.splice(0, charsPerLine).join(""));
      }
      if (chars.length && lines.length) {
        const remain = chars.join("");
        lines[lines.length - 1] = clip(lines[lines.length - 1] + remain, charsPerLine);
      }
      return lines;
    }

    function renderSvgTextBlock(x, y, text, options = {}) {
      const lines = wrapSvgLines(text, options.charsPerLine || 12, options.maxLines || 3);
      const fill = options.fill || "#171b20";
      const size = options.size || 15;
      const weight = options.weight || 700;
      const lineHeight = options.lineHeight || (size + 5);
      const anchor = options.anchor || "middle";
      return lines.map((line, index) => `
        <text x="${x}" y="${y + (index * lineHeight)}" text-anchor="${anchor}" font-size="${size}" font-weight="${weight}" fill="${fill}" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">${esc(line)}</text>
      `).join("");
    }

    function renderLeadIllustration(lead, checks) {
      if (!lead) return "";

      const processes = arr(lead.processes).slice(0, 3);
      const guidePills = uniq(arr(checks), (item) => norm(item)).slice(0, 3);
      const nodeY = [72, 136, 200];
      const processNodes = (processes.length ? processes : ["注視工程を整理中", "追加根拠待ち", sourceLabel(lead.source)])
        .slice(0, 3)
        .map((label, index) => {
          const y = nodeY[index];
          return `
            <path d="M240 ${132 + (index - 1) * 18} C300 ${132 + (index - 1) * 18}, 330 ${y + 8}, 392 ${y + 8}" fill="none" stroke="${index === 0 ? "#9b1c1c" : "#1d3e63"}" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="392" y="${y - 18}" width="180" height="44" rx="18" fill="${index === 0 ? "rgba(155,28,28,0.12)" : "rgba(29,62,99,0.1)"}" stroke="${index === 0 ? "#9b1c1c" : "#1d3e63"}" stroke-width="1.4"/>
            ${renderSvgTextBlock(482, y + 1, label, { charsPerLine: 11, maxLines: 2, size: 14, lineHeight: 16 })}
          `;
        }).join("");
      const guideNodes = guidePills.map((label, index) => {
        const x = 38 + (index * 184);
        return `
          <rect x="${x}" y="228" width="162" height="28" rx="14" fill="rgba(255,253,248,0.86)" stroke="rgba(23,27,32,0.16)"/>
          ${renderSvgTextBlock(x + 81, 247, label, { charsPerLine: 14, maxLines: 1, size: 12, lineHeight: 14 })}
        `;
      }).join("");

      return `
        <div class="art-shell">
          <svg viewBox="0 0 620 270" role="img" aria-label="今日の主役テーマの図解">
            <defs>
              <linearGradient id="leadPanel" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="rgba(255,253,248,0.98)"/>
                <stop offset="100%" stop-color="rgba(246,242,234,0.96)"/>
              </linearGradient>
            </defs>
            <rect x="1" y="1" width="618" height="268" rx="24" fill="url(#leadPanel)" stroke="rgba(23,27,32,0.14)"/>
            <circle cx="165" cy="132" r="78" fill="rgba(155,28,28,0.14)" stroke="#9b1c1c" stroke-width="2"/>
            <circle cx="165" cy="132" r="44" fill="rgba(255,253,248,0.96)" stroke="rgba(23,27,32,0.14)"/>
            ${renderSvgTextBlock(165, 118, lead.theme || "今日の論点", { charsPerLine: 10, maxLines: 4, size: 15, lineHeight: 17 })}
            <rect x="34" y="28" width="152" height="28" rx="14" fill="rgba(29,62,99,0.14)"/>
            ${renderSvgTextBlock(110, 47, sourceLabel(lead.source), { charsPerLine: 10, maxLines: 1, size: 12, lineHeight: 14 })}
            ${processNodes}
            ${guideNodes}
          </svg>
          <p class="art-caption">左の大円が今日の主役テーマ、右のノードが波及先、下の帯が朝イチ確認です。</p>
        </div>
      `;
    }

    function storyCategoryLabel(item) {
      const text = `${safe(item.headline, "")} ${safe(item.summary, "")} ${safe(item.why, "")} ${safe(item.theme, "")}`;
      if (/原油|中東|海運|保険|LNG|資源/.test(text)) return "資源・エネルギー";
      if (/FOMC|日銀|金利|首脳|イベント|指標/.test(text)) return "政策イベント";
      if (/決算|業績|上方|下方|IR/.test(text)) return "決算・IR";
      if (/半導体|AI|データセンター|電力/.test(text)) return "成長テーマ";
      if (item.source === "x") return "仮説フロー";
      return "市場観測";
    }

    function storyActionLabel(item) {
      const text = `${safe(item.headline, "")} ${safe(item.summary, "")} ${safe(item.why, "")} ${safe(item.theme, "")}`;
      if (/警戒|緊張|報復|封鎖|イベント/.test(text)) return "寄り前ヘッドライン";
      if (/注目株|関連株|テーマ|思惑/.test(text)) return "連想先と出来高";
      if (/決算|上方|下方|受注|提携|設備投資/.test(text)) return "IRの具体化確認";
      return "次の一報待ち";
    }

    function renderStoryPoster(item, index) {
      const source = sourceLabel(item.source);
      const category = storyCategoryLabel(item);
      const action = storyActionLabel(item);
      const theme = safe(item.theme, category);
      const summary = clip(item.summary || item.why || "要点整理中", 52);
      const palette = index % 2 === 0
        ? {
            stroke: "#9b1c1c",
            soft: "rgba(155,28,28,0.12)",
            deep: "rgba(155,28,28,0.18)",
          }
        : {
            stroke: "#1d3e63",
            soft: "rgba(29,62,99,0.12)",
            deep: "rgba(29,62,99,0.18)",
          };

      return `
        <div class="story-poster">
          <div class="story-scene">
            <svg viewBox="0 0 280 252" role="img" aria-label="ニュースを図解したカード">
              <rect x="1" y="1" width="278" height="250" rx="22" fill="rgba(255,253,248,0.96)" stroke="rgba(23,27,32,0.14)"/>
              <rect x="20" y="18" width="92" height="28" rx="14" fill="${palette.soft}" stroke="${palette.stroke}"/>
              ${renderSvgTextBlock(66, 37, source, { charsPerLine: 8, maxLines: 1, size: 12, lineHeight: 14 })}
              <circle cx="74" cy="100" r="40" fill="${palette.deep}" stroke="${palette.stroke}" stroke-width="1.8"/>
              <circle cx="74" cy="100" r="22" fill="rgba(255,253,248,0.95)" stroke="rgba(23,27,32,0.14)"/>
              <text x="74" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="${palette.stroke}" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">Story</text>
              <text x="74" y="111" text-anchor="middle" font-size="20" font-weight="700" fill="${palette.stroke}" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">#${index + 2}</text>
              <path d="M114 100 C138 100, 146 82, 164 82" fill="none" stroke="${palette.stroke}" stroke-width="2.5" stroke-linecap="round"/>
              <rect x="158" y="48" width="100" height="68" rx="18" fill="${palette.soft}" stroke="${palette.stroke}" stroke-width="1.4"/>
              ${renderSvgTextBlock(208, 71, theme, { charsPerLine: 7, maxLines: 3, size: 13, lineHeight: 14 })}
              <rect x="26" y="146" width="228" height="58" rx="18" fill="rgba(255,253,248,0.95)" stroke="rgba(23,27,32,0.14)"/>
              ${renderSvgTextBlock(140, 168, summary, { charsPerLine: 18, maxLines: 3, size: 12, lineHeight: 13 })}
              <rect x="24" y="214" width="74" height="22" rx="11" fill="rgba(255,253,248,0.95)" stroke="rgba(23,27,32,0.12)"/>
              ${renderSvgTextBlock(61, 228, category, { charsPerLine: 9, maxLines: 1, size: 11, lineHeight: 12 })}
              <rect x="106" y="214" width="148" height="22" rx="11" fill="rgba(255,253,248,0.95)" stroke="rgba(23,27,32,0.12)"/>
              ${renderSvgTextBlock(180, 228, action, { charsPerLine: 13, maxLines: 1, size: 11, lineHeight: 12 })}
            </svg>
          </div>
          <div class="story-copy">
            <div class="story-meta">
              <span class="badge red">#${index + 2}</span>
              <span class="badge">${esc(source)}</span>
              <span class="small">${item.timestamp ? esc(jpTime(item.timestamp)) : "日時不明"}</span>
            </div>
            <h4>${item.url ? `<a class="story-link" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">${esc(item.headline)}</a>` : esc(item.headline)}</h4>
            <p class="body">${esc(item.summary || item.why || "要点整理中")}</p>
            <div class="story-ribbon">
              <span class="story-pill">分類: ${esc(category)}</span>
              <span class="story-pill">論点: ${esc(clip(theme, 28))}</span>
              <span class="story-pill">次: ${esc(action)}</span>
            </div>
          </div>
        </div>
      `;
    }

    function sourceDesk(data) {
      const seeded = [];
      arr(data.source_list).forEach((item) => seeded.push(item));
      arr(data.hypothesis_sources).forEach((item) => seeded.push(item));
      if (!arr(data.source_list).length) {
        collectNews(data).forEach((item) => seeded.push(item));
      }
      if (!arr(data.hypothesis_sources).length) {
        arr(data.trending_themes).forEach((theme) => {
          arr(theme.key_tweets).slice(0, 1).forEach((text) => seeded.push({
            source: "x",
            headline: text,
            role: "hypothesis",
            theme: theme.theme,
          }));
        });
      }

      return uniq(
        seeded.sort((a, b) => new Date(b.timestamp || 0).getTime() - new Date(a.timestamp || 0).getTime()),
        (item) => safe(item.url, "").trim() || `${safe(item.role, "")}|${safe(item.source, "")}|${norm(item.headline)}`
      );
    }

    function deskKind(item) {
      const text = `${safe(item.headline, "")} ${safe(item.theme, "")}`;
      if (item.source === "x" || item.role === "hypothesis") return "hypothesis";
      if (item.role === "backdrop" || /(ドル円|円安|円高|金利|原油|先物|市況|雇用|cpi|fomc|指数|ホルムズ|lng|opec|iea)/i.test(text)) return "background";
      return "evidence";
    }

    function renderTable(headers, rows) {
      if (!rows.length) return '<div class="empty">掲載できる項目がまだありません。</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${headers.map((h) => `<th>${esc(h)}</th>`).join("")}</tr></thead>
            <tbody>${rows.map((row) => `<tr>${row.map((col) => `<td>${col}</td>`).join("")}</tr>`).join("")}</tbody>
          </table>
        </div>
      `;
    }

    function renderMasthead(data) {
      return `
        <div class="topline">
          <p class="label">KABUKURA MORNING EDITION</p>
          <div class="badge-row">
            <span class="badge red">${esc(edition(data))}</span>
            <span class="badge navy">${esc(jpTime(data.analysis_date))} JST</span>
          </div>
        </div>
        <h1>株クラ朝刊</h1>
        <p class="sub">ニュース内容を主役に、朝に読む順番で整理するダイジェストです。</p>
        <div class="navline">一面トップ / 図解ブリーフ / 主要ニュース / テーマ別ニュース / ソース棚 / 銘柄メモ / 0件日運用 / Markdown / JSON</div>
      `;
    }

    function renderFront(data) {
      const news = collectNews(data);
      const lead = news[0];
      const checks = uniq(
        [...arr(data.next_checks), ...arr(data.next_check_guidance).flatMap((item) => arr(item.triggers))],
        (item) => norm(item)
      ).slice(0, 5);

      const main = lead
        ? `
          <article class="story" id="story-1">
            <div class="badge-row">
              <span class="badge red">#1</span>
              <span class="badge ${lead.role === "investable" ? "navy" : "green"}">${lead.role === "investable" ? "トップ記事" : "背景トップ"}</span>
              <span class="badge">${esc(sourceLabel(lead.source))}</span>
            </div>
            <h2 style="margin-top:12px;">${lead.url ? `<a class="story-link" href="${esc(lead.url)}" target="_blank" rel="noopener noreferrer">${esc(lead.headline)}</a>` : esc(lead.headline)}</h2>
            <p class="lead">${esc(lead.summary || lead.why || data.market_sentiment)}</p>
            <div class="highlight">
              <p><strong>なぜ重要か:</strong> ${esc(clip(lead.why || data.market_sentiment, 170))}</p>
              <p class="body"><strong>関連テーマ:</strong> ${esc(lead.theme)}</p>
              ${lead.processes.length ? `<p class="body"><strong>注視工程:</strong> ${esc(lead.processes.slice(0, 3).join(" / "))}</p>` : ""}
            </div>
            ${renderLeadIllustration(lead, checks)}
          </article>
        `
        : `
          <article class="story">
            <h2>今日の結論</h2>
            <p class="lead">${esc(data.market_sentiment || "本日は背景相場中心です。")}</p>
          </article>
        `;

      return `
        <div class="section-head">
          <div>
            <p class="label">Front</p>
            <h3>一面トップ</h3>
            <p class="desc">最初に読むニュースを 1 本だけ大きく置きます。</p>
          </div>
        </div>
        <div class="hero">
          ${main}
          <aside class="memo">
            <p class="label">Morning Memo</p>
            <p><strong>本命候補:</strong> ${arr(data.direct_picks).length + arr(data.associative_picks || data.stock_picks).length}</p>
            <p><strong>監視候補:</strong> ${arr(data.watch_candidates).length}</p>
            <p><strong>注視テーマ:</strong> ${arr(data.investable_themes).length || arr(data.market_backdrop).length}</p>
            <p><strong>主要ニュース:</strong> ${news.length}</p>
            <div class="card" style="margin-top:14px;">
              <p class="label">朝イチ確認</p>
              ${checks.length ? `<ul>${checks.map((item) => `<li>${esc(item)}</li>`).join("")}</ul>` : '<div class="small">確認項目は未整理です。</div>'}
            </div>
          </aside>
        </div>
      `;
    }

    function renderTopNews(data) {
      const news = collectNews(data);
      const stories = news.slice(1, 8);

      return `
        <div class="section-head">
          <div>
            <p class="label">Top News</p>
            <h3>主要ニュース</h3>
            <p class="desc">一面トップ以外の主要ニュースを、本文つきでここにまとめます。</p>
          </div>
        </div>
        ${stories.length ? `
          <div class="story-list">
            ${stories.map((item, index) => `
              <article class="story-item" id="story-${index + 2}">
                ${renderStoryPoster(item, index)}
              </article>
            `).join("")}
          </div>
        ` : '<div class="empty">一面トップ以外の主要ニュースはまだありません。</div>'}
      `;
    }

    function splitFlowChain(chain) {
      return safe(chain, "")
        .split(/->|→|⇒/)
        .map((item) => safe(item, "").trim())
        .filter(Boolean);
    }

    function renderFlowCard(entry) {
      const nodes = uniq(
        [entry.rootTheme, ...arr(entry.steps), entry.target],
        (item) => norm(item)
      ).slice(0, 4);
      const xStep = nodes.length > 1 ? 280 / (nodes.length - 1) : 0;
      const svgNodes = nodes.map((node, index) => {
        const x = 24 + (index * xStep);
        const y = index % 2 === 0 ? 56 : 104;
        return `
          ${index < nodes.length - 1 ? `<path d="M${x + 84} ${y + 22} C${x + 108} ${y + 22}, ${x + 124} ${index % 2 === 0 ? 126 : 78}, ${x + 148} ${index % 2 === 0 ? 126 : 78}" fill="none" stroke="#9b1c1c" stroke-width="2.5" stroke-linecap="round"/>` : ""}
          <rect x="${x}" y="${y}" width="92" height="44" rx="16" fill="rgba(255,253,248,0.94)" stroke="${index === nodes.length - 1 ? "#9b1c1c" : "rgba(29,62,99,0.36)"}" stroke-width="${index === nodes.length - 1 ? "1.8" : "1.2"}"/>
          ${renderSvgTextBlock(x + 46, y + 19, node, { charsPerLine: 8, maxLines: 2, size: 12, lineHeight: 13 })}
        `;
      }).join("");

      return `
        <article class="flow-card">
          <div class="badge-row">
            <span class="badge ${entry.kind === "watch" ? "green" : "navy"}">${esc(entry.kind === "watch" ? "監視フロー" : "本命フロー")}</span>
          </div>
          <h4 style="margin-top:10px;">${esc(entry.title)}</h4>
          <div class="flow-art">
            <svg viewBox="0 0 360 170" role="img" aria-label="テーマから銘柄までの流れ">
              <rect x="1" y="1" width="358" height="168" rx="22" fill="rgba(255,253,248,0.92)" stroke="rgba(23,27,32,0.14)"/>
              <circle cx="326" cy="30" r="13" fill="rgba(155,28,28,0.14)" stroke="#9b1c1c"/>
              <text x="326" y="35" text-anchor="middle" font-size="11" font-weight="700" fill="#9b1c1c" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">${esc(entry.kind === "watch" ? "W" : "P")}</text>
              ${svgNodes}
            </svg>
          </div>
          <p class="small"><strong>次に見る:</strong> ${esc(clip(entry.note, 84))}</p>
          ${entry.risk ? `<p class="small"><strong>弱さ:</strong> ${esc(clip(entry.risk, 84))}</p>` : ""}
        </article>
      `;
    }

    function renderThemeAtlasSvg(themes) {
      const mentionMax = Math.max(...themes.map((theme) => Number(theme.mention_count) || 0), 1);
      const positions = [
        { x: 120, y: 110 },
        { x: 490, y: 100 },
        { x: 150, y: 280 },
        { x: 470, y: 278 },
      ];

      const themeNodes = themes.slice(0, 4).map((theme, index) => {
        const pos = positions[index] || positions[positions.length - 1];
        const radius = 36 + Math.round(((Number(theme.mention_count) || 0) / mentionMax) * 22);
        const stroke = index % 2 === 0 ? "#9b1c1c" : "#1d3e63";
        const fill = index % 2 === 0 ? "rgba(155,28,28,0.12)" : "rgba(29,62,99,0.12)";
        return `
          <path d="M320 180 C${pos.x + 24} 180, ${pos.x} ${pos.y}, ${pos.x} ${pos.y}" fill="none" stroke="${stroke}" stroke-width="2.4" stroke-linecap="round"/>
          <circle cx="${pos.x}" cy="${pos.y}" r="${radius}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
          ${renderSvgTextBlock(pos.x, pos.y - 6, theme.theme, { charsPerLine: 9, maxLines: 3, size: 13, lineHeight: 14 })}
          <rect x="${pos.x - 32}" y="${pos.y + radius - 4}" width="64" height="24" rx="12" fill="rgba(255,253,248,0.92)" stroke="rgba(23,27,32,0.12)"/>
          <text x="${pos.x}" y="${pos.y + radius + 12}" text-anchor="middle" font-size="12" font-weight="700" fill="${stroke}" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">${esc(`${theme.mention_count}件`)}</text>
        `;
      }).join("");

      return `
        <svg viewBox="0 0 620 380" role="img" aria-label="今日の市場地図">
          <defs>
            <radialGradient id="atlasCore" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stop-color="rgba(255,253,248,0.98)"/>
              <stop offset="100%" stop-color="rgba(246,242,234,0.94)"/>
            </radialGradient>
          </defs>
          <rect x="1" y="1" width="618" height="378" rx="26" fill="url(#atlasCore)" stroke="rgba(23,27,32,0.14)"/>
          <circle cx="310" cy="188" r="74" fill="rgba(23,27,32,0.04)" stroke="rgba(23,27,32,0.16)" stroke-dasharray="5 8"/>
          <circle cx="310" cy="188" r="48" fill="rgba(255,253,248,0.96)" stroke="#171b20" stroke-width="1.8"/>
          ${renderSvgTextBlock(310, 176, "今日の市場地図", { charsPerLine: 10, maxLines: 2, size: 16, lineHeight: 18 })}
          ${themeNodes}
          <text x="310" y="338" text-anchor="middle" font-size="12" fill="#5f6770" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">円の大きさは mention_count、線は今日つながって見える論点です</text>
        </svg>
      `;
    }

    function renderBriefing(data) {
      const newsIndex = buildNewsIndex(collectNews(data));
      const themes = (arr(data.investable_themes).length ? arr(data.investable_themes) : arr(data.market_backdrop)).slice(0, 4);
      const mentionMax = Math.max(...themes.map((theme) => Number(theme.mention_count) || 0), 1);
      const picks = [
        ...arr(data.direct_picks),
        ...arr(data.associative_picks || data.stock_picks),
        ...arr(data.watch_candidates),
      ].slice(0, 2);
      const flows = picks.length
        ? picks.map((pick) => ({
            kind: arr(data.watch_candidates).some((item) => item.code === pick.code) ? "watch" : "pick",
            title: `${pick.name} (${pick.code})`,
            rootTheme: pick.root_theme || "関連テーマ",
            steps: splitFlowChain(pick.chain),
            target: `${pick.name} (${pick.code})`,
            note: pick.catalyst || pick.reasoning,
            risk: pick.risk,
          }))
        : themes.slice(0, 2).map((theme) => ({
            kind: "watch",
            title: theme.theme,
            rootTheme: theme.theme,
            steps: arr(theme.beneficiary_processes).slice(0, 3),
            target: "関連銘柄を監視",
            note: theme.why_it_matters || "次のニュース待ち",
            risk: "",
          }));

      return `
        <div class="section-head">
          <div>
            <p class="label">Visual Brief</p>
            <h3>図解ブリーフ</h3>
            <p class="desc">テーマの強さと、テーマから銘柄までの流れを図で把握する欄です。</p>
          </div>
        </div>
        <div class="brief-grid">
          <div class="signal-stack">
            ${themes.length ? `
              <article class="signal-card">
                <p class="svg-eyebrow">Theme Atlas</p>
                <h4>今日の市場地図</h4>
                <div class="atlas-shell">${renderThemeAtlasSvg(themes)}</div>
                <div class="legend-grid">
                  ${themes.map((theme, index) => {
                    const meter = Math.max(22, Math.round(((Number(theme.mention_count) || 0) / mentionMax) * 100));
                    return `
                      <article class="legend-card">
                        <div class="signal-head">
                          <p class="label">Theme ${index + 1}</p>
                          <span class="badge ${index === 0 ? "red" : "navy"}">${esc(`${theme.mention_count}件`)}</span>
                        </div>
                        <p><strong>${esc(theme.theme)}</strong></p>
                        <p class="body">${esc(clip(theme.why_it_matters || "要点整理中", 90))}</p>
                        <div class="meter"><div class="meter-fill" style="width:${meter}%"></div></div>
                        ${arr(theme.beneficiary_processes).length ? `<div class="chip-row">${arr(theme.beneficiary_processes).slice(0, 3).map((item) => `<span class="mini-chip">${esc(item)}</span>`).join("")}</div>` : ""}
                        ${renderStoryRefList(theme.news_items, newsIndex)}
                      </article>
                    `;
                  }).join("")}
                </div>
              </article>
            ` : '<div class="empty">図解に使えるテーマがまだありません。</div>'}
          </div>
          <div class="flow-stack">
            ${flows.map((entry) => renderFlowCard(entry)).join("")}
          </div>
        </div>
      `;
    }

    function renderThemeNews(data) {
      const newsIndex = buildNewsIndex(collectNews(data));
      const themes = (arr(data.investable_themes).length ? arr(data.investable_themes) : arr(data.market_backdrop)).slice(0, 4);
      if (!themes.length) {
        return `
          <div class="section-head">
            <div>
              <p class="label">Theme News</p>
              <h3>テーマ別ニュース</h3>
            </div>
          </div>
          <div class="empty">テーマ別に整理できるニュースがまだありません。</div>
        `;
      }

      return `
        <div class="section-head">
          <div>
            <p class="label">Theme News</p>
            <h3>テーマ別ニュース</h3>
            <p class="desc">ニュースをテーマごとに束ねて、どう読むかを短く添えます。</p>
          </div>
        </div>
        <div class="theme-grid">
          ${themes.map((theme) => `
            <article class="theme-box">
              <div class="badge-row">
                <span class="badge ${arr(data.investable_themes).some((item) => item.theme === theme.theme) ? "navy" : "green"}">${arr(data.investable_themes).some((item) => item.theme === theme.theme) ? "本命テーマ" : "背景テーマ"}</span>
              </div>
              <h4 style="margin-top:10px;">${esc(theme.theme)}</h4>
              <p class="body">${esc(theme.why_it_matters || "重要度整理はこれからです。")}</p>
              ${arr(theme.beneficiary_processes).length ? `<p class="small"><strong>注視工程:</strong> ${esc(arr(theme.beneficiary_processes).slice(0, 3).join(" / "))}</p>` : ""}
              <div class="card" style="margin-top:14px;">
                <p class="label">関連記事</p>
                ${renderStoryRefList(theme.news_items, newsIndex)}
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderSourceDesk(data) {
      const desk = sourceDesk(data);
      const newsIndex = buildNewsIndex(collectNews(data));
      const evidence = desk.filter((item) => deskKind(item) === "evidence");
      const background = desk.filter((item) => deskKind(item) === "background");
      const hypothesis = desk.filter((item) => deskKind(item) === "hypothesis");

      return `
        <div class="section-head">
          <div>
            <p class="label">Source Desk</p>
            <h3>ソース棚</h3>
            <p class="desc">根拠源、背景源、仮説源を別棚にして、役割を混ぜないようにします。</p>
          </div>
        </div>
        <div class="two-col">
          <div class="memo">
            <p class="label">根拠源</p>
            ${renderDeskNotes(evidence, newsIndex, "根拠源はまだ整理されていません。")}
          </div>
          <div class="memo">
            <p class="label">背景源</p>
            ${renderDeskNotes(background, newsIndex, "背景源はまだ整理されていません。")}
          </div>
        </div>
        <div class="memo" style="margin-top:16px;">
          <p class="label">仮説源</p>
          ${renderDeskNotes(hypothesis, newsIndex, "仮説源はまだ薄いです。")}
        </div>
      `;
    }

    function renderStockMemo(data) {
      const picks = [
        ...arr(data.direct_picks).map((pick) => ["本命", pick]),
        ...arr(data.associative_picks || data.stock_picks).map((pick) => ["本命候補", pick]),
        ...arr(data.watch_candidates).map((pick) => ["監視", pick]),
      ];
      const rows = picks.slice(0, 8).map(([label, pick]) => [
        esc(label),
        `<strong>${esc(pick.name)} (${esc(pick.code)})</strong>`,
        esc(clip(pick.root_theme || pick.chain || "-", 70)),
        esc(clip(pick.reasoning || "-", 96)),
        esc(clip(pick.catalyst || "-", 56)),
      ]);

      return `
        <div class="section-head">
          <div>
            <p class="label">Stock Memo</p>
            <h3>銘柄メモ</h3>
            <p class="desc">ニュースを読んだあとに、候補銘柄の読み筋だけを確認する欄です。</p>
          </div>
        </div>
        ${rows.length ? renderTable(["区分", "銘柄", "根テーマ", "読み筋", "昇格条件"], rows) : '<div class="empty">今日はニュース優先で、銘柄候補はまだ出していません。</div>'}
      `;
    }

    function renderZeroDay(data) {
      const boards = [
        ...arr(data.sector_watch).map((item) => ({ label: "注視業種", title: item.sector, body: item.why, points: arr(item.promotion_conditions) })),
        ...arr(data.process_watch).map((item) => ({ label: "注視工程", title: item.process, body: item.focus, points: arr(item.promotion_conditions) })),
      ];
      if (!boards.length) {
        return `
          <div class="section-head">
            <div>
              <p class="label">Zero-Day</p>
              <h3>0件日運用</h3>
            </div>
          </div>
          <div class="empty">0件日ボードはありません。</div>
        `;
      }

      return `
        <div class="section-head">
          <div>
            <p class="label">Zero-Day</p>
            <h3>0件日運用</h3>
            <p class="desc">ニュースが薄い日でも、次に何を見るかだけは残します。</p>
          </div>
        </div>
        <div class="two-col">
          ${boards.slice(0, 6).map((item) => `
            <article class="memo">
              <div class="badge-row"><span class="badge ${item.label === "注視業種" ? "green" : "red"}">${esc(item.label)}</span></div>
              <h4 style="margin-top:10px;">${esc(item.title)}</h4>
              <p class="body">${esc(clip(item.body, 140))}</p>
              ${item.points.length ? `<ul>${item.points.slice(0, 3).map((point) => `<li>${esc(point)}</li>`).join("")}</ul>` : ""}
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderFooter(data) {
      return `
        <div class="section-head">
          <div>
            <p class="label">Archive</p>
            <h3>詳細ファイル</h3>
            <p class="desc">全文は Markdown と JSON に残します。</p>
          </div>
        </div>
        <div class="links">
          <a class="story-link" href="./latest-analysis-full.md">latest-analysis-full.md</a>
          <a class="story-link" href="./latest-analysis-full.json">latest-analysis-full.json</a>
        </div>
        <p class="small" style="margin-top:12px;">最終更新: ${esc(jpTime(data.analysis_date))}</p>
      `;
    }

    function render(data) {
      $("masthead").innerHTML = renderMasthead(data);
      $("front").innerHTML = renderFront(data);
      $("briefing").innerHTML = renderBriefing(data);
      $("top-news").innerHTML = renderTopNews(data);
      $("theme-news").innerHTML = renderThemeNews(data);
      $("source-desk").innerHTML = renderSourceDesk(data);
      $("stock-memo").innerHTML = renderStockMemo(data);
      $("zero-day").innerHTML = renderZeroDay(data);
      $("footer").innerHTML = renderFooter(data);
    }

    function renderError(error) {
      $("masthead").innerHTML = `<div class="error">latest-analysis-full.json の読み込みに失敗しました: ${esc(error.message)}</div>`;
      ["front", "briefing", "top-news", "theme-news", "source-desk", "stock-memo", "zero-day", "footer"]
        .forEach((id) => { $(id).innerHTML = '<div class="empty">表示に必要なデータを読み込めませんでした。</div>'; });
    }

    fetch("./latest-analysis-full.json", { cache: "no-store" })
      .then((res) => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(render)
      .catch(renderError);
  </script>
</body>
</html>
