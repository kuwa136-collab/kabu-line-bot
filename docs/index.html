<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>株クラ朝刊</title>
  <style>
    :root {
      --paper: #f6f0e4;
      --paper-strong: #fffdf8;
      --ink: #14181c;
      --muted: #5a626a;
      --rule: rgba(20, 24, 28, 0.16);
      --rule-strong: rgba(20, 24, 28, 0.3);
      --accent: #7f1d1d;
      --accent-soft: rgba(127, 29, 29, 0.08);
      --navy: #17324f;
      --navy-soft: rgba(23, 50, 79, 0.08);
      --green: #2f5d4f;
      --green-soft: rgba(47, 93, 79, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0)),
        var(--paper);
      font-family: "BIZ UDPGothic", "Yu Gothic", sans-serif;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }

    .sheet {
      background: var(--paper-strong);
      border: 1px solid var(--rule);
      box-shadow: 0 18px 48px rgba(53, 43, 28, 0.1);
    }

    .masthead {
      padding: 22px 22px 14px;
      border-bottom: 3px double var(--rule-strong);
    }

    .masthead-top,
    .meta-row,
    .link-row,
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }

    .masthead-top {
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .paper-label {
      margin: 0;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    h1, h2, h3 {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      line-height: 1.25;
    }

    h1 {
      font-size: clamp(38px, 7vw, 68px);
      letter-spacing: 0.08em;
      text-align: center;
    }

    h2 {
      font-size: 28px;
    }

    h3 {
      font-size: 22px;
    }

    p {
      margin: 0;
      line-height: 1.85;
    }

    .dateline,
    .subtitle,
    .body,
    .small {
      color: var(--muted);
    }

    .dateline,
    .small {
      font-size: 13px;
    }

    .subtitle {
      margin-top: 8px;
      text-align: center;
      font-size: 15px;
    }

    .navline {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--rule);
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .section {
      padding: 22px;
      border-top: 1px solid var(--rule);
    }

    .section:first-of-type {
      border-top: 0;
    }

    .frontpage {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(300px, 0.95fr);
      gap: 0;
    }

    .front-main {
      padding: 24px 22px;
      border-right: 1px solid var(--rule);
    }

    .front-side {
      padding: 24px 22px;
      background: rgba(20, 24, 28, 0.02);
    }

    .headline-note {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .lead {
      margin-top: 14px;
      font-size: 20px;
      line-height: 1.9;
    }

    .summary-box {
      margin-top: 18px;
      padding: 16px 18px;
      border: 1px solid var(--rule);
      background:
        linear-gradient(180deg, rgba(127, 29, 29, 0.05), rgba(127, 29, 29, 0.01));
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(20, 24, 28, 0.06);
    }

    .badge.red { background: var(--accent-soft); color: var(--accent); }
    .badge.navy { background: var(--navy-soft); color: var(--navy); }
    .badge.green { background: var(--green-soft); color: var(--green); }

    .kpi-grid,
    .note-grid,
    .boards {
      display: grid;
      gap: 12px;
    }

    .kpi-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 18px;
    }

    .kpi,
    .note-card,
    .board-card {
      padding: 14px;
      border: 1px solid var(--rule);
      background: var(--paper-strong);
    }

    .kpi strong {
      display: block;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .kpi span {
      display: block;
      margin-top: 6px;
      font-size: 28px;
      font-weight: 700;
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--ink);
    }

    .section-kicker {
      margin: 0 0 4px;
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .section-desc {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--rule);
      vertical-align: top;
      text-align: left;
    }

    th {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--muted);
      white-space: nowrap;
    }

    td strong {
      color: var(--ink);
    }

    .mono {
      font-family: ui-monospace, "Cascadia Code", "SFMono-Regular", monospace;
      font-size: 12px;
    }

    .link {
      color: var(--navy);
      text-decoration: none;
      border-bottom: 1px solid rgba(23, 50, 79, 0.25);
    }

    .link:hover {
      border-bottom-color: var(--navy);
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .plain-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    .empty,
    .loading,
    .error {
      padding: 16px;
      border: 1px dashed var(--rule-strong);
      background: rgba(20, 24, 28, 0.02);
      color: var(--muted);
      line-height: 1.8;
    }

    .footer-links {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--rule);
    }

    @media (max-width: 980px) {
      .frontpage,
      .two-col {
        grid-template-columns: 1fr;
      }

      .front-main {
        border-right: 0;
        border-bottom: 1px solid var(--rule);
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 10px 8px 28px;
      }

      .masthead,
      .section,
      .front-main,
      .front-side {
        padding: 16px;
      }

      .kpi-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="sheet">
      <header class="masthead" id="masthead">
        <div class="loading">朝刊を読み込んでいます。</div>
      </header>

      <section class="frontpage">
        <article class="front-main" id="front-main"></article>
        <aside class="front-side" id="front-side"></aside>
      </section>

      <section class="section" id="theme-section"></section>
      <section class="section" id="pick-section"></section>
      <section class="section" id="evidence-section"></section>
      <section class="section" id="hypothesis-section"></section>
      <section class="section" id="background-section"></section>
      <section class="section" id="zero-day-section"></section>
      <section class="section" id="footer-section"></section>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const arr = (v) => Array.isArray(v) ? v : [];
    const safe = (v, d = "情報なし") => v == null || v === "" ? d : String(v);
    const esc = (v) => safe(v, "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll("\"", "&quot;");
    const clip = (v, n = 110) => { const t = safe(v, ""); return t.length > n ? `${t.slice(0, n - 1)}…` : t; };
    const norm = (v) => safe(v, "").toLowerCase().replace(/\s+/g, "").replace(/[【】［］\[\]（）()＜＞<>「」『』・:：!！?？,，.。/]/g, "");
    const uniq = (items, keyOf) => { const seen = new Set(); return (items || []).filter((item) => { const key = keyOf(item); if (!key || seen.has(key)) return false; seen.add(key); return true; }); };
    const jpTime = (v) => { const d = new Date(v || ""); return Number.isNaN(d.getTime()) ? safe(v, "日時不明") : new Intl.DateTimeFormat("ja-JP", { timeZone: "Asia/Tokyo", year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }).format(d); };
    const sourceLabel = (v) => ({ x: "X", kabutan: "株探", minkabu: "みんかぶ", yahoo: "Yahoo" }[v] || safe(v, "source"));

    function classifyMode(data) {
      const direct = arr(data.direct_picks);
      const assoc = arr(data.associative_picks || data.stock_picks);
      const watch = arr(data.watch_candidates);
      const sector = arr(data.sector_watch);
      const process = arr(data.process_watch);
      if (direct.length + assoc.length > 0) {
        const top = direct[0] || assoc[0];
        return {
          edition: "本命候補号",
          lead: `${top.name} を含む本命候補が立っています。今日はテーマ継続と裏取りの強さで順位を付ける日です。`,
          focus: top.root_theme || data.market_sentiment,
        };
      }
      if (watch.length > 0) {
        return {
          edition: "監視強化号",
          lead: "まだ本命化は早いものの、次の一段を見に行く価値がある監視候補は残っています。昇格条件の確認が主戦場です。",
          focus: watch[0].root_theme || data.market_sentiment,
        };
      }
      if (sector.length + process.length > 0) {
        return {
          edition: "0件日運用号",
          lead: "個別材料が薄い日は、無理に銘柄を捻り出さず、注視業種・注視工程・昇格条件を整理して次の火種を待ちます。",
          focus: sector[0]?.sector || process[0]?.process || data.market_sentiment,
        };
      }
      return {
        edition: "背景整理号",
        lead: "今日はまず背景相場を読む日です。個別の強引な本命化より、為替・原油・金利・指数の方向感を先に揃えます。",
        focus: arr(data.market_backdrop)[0]?.theme || data.market_sentiment,
      };
    }

    function collectSources(data) {
      const seeded = [];
      const pushTheme = (themes, role) => arr(themes).forEach((theme) => arr(theme.news_items).forEach((item) => seeded.push({
        source: item.source,
        headline: item.headline,
        url: item.url,
        timestamp: item.timestamp,
        role,
        theme: theme.theme,
      })));

      pushTheme(data.investable_themes, "investable");
      pushTheme(data.market_backdrop, "backdrop");
      arr(data.source_list).forEach((item) => seeded.push(item));
      arr(data.hypothesis_sources).forEach((item) => seeded.push(item));

      if (!arr(data.hypothesis_sources).length) {
        arr(data.trending_themes).forEach((theme) => {
          arr(theme.key_tweets).slice(0, 1).forEach((text) => seeded.push({
            source: "x",
            headline: text,
            role: "hypothesis",
            theme: theme.theme,
          }));
        });
      }

      return uniq(
        seeded.sort((a, b) => new Date(b.timestamp || 0).getTime() - new Date(a.timestamp || 0).getTime()),
        (item) => safe(item.url, "").trim() || `${safe(item.role, "")}|${safe(item.source, "")}|${norm(item.headline)}`
      );
    }

    function sourceKind(item) {
      const text = `${safe(item.headline, "")} ${safe(item.theme, "")}`;
      if (item.source === "x" || item.role === "hypothesis") return "hypothesis";
      if (item.role === "backdrop" || /(ドル円|円安|円高|金利|原油|先物|市況|雇用|cpi|fomc|指数|ホルムズ|lng|opec|iea)/i.test(text)) return "background";
      return "evidence";
    }

    function renderTable(headers, rows) {
      if (!rows.length) return '<div class="empty">掲載できる項目がまだありません。</div>';
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>${headers.map((h) => `<th>${esc(h)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${rows.map((row) => `<tr>${row.map((col) => `<td>${col}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function buildMasthead(data) {
      const mode = classifyMode(data);
      return `
        <div class="masthead-top">
          <p class="paper-label">KABUKURA MORNING EDITION</p>
          <div class="badge-row">
            <span class="badge red">${esc(mode.edition)}</span>
            <span class="badge navy">${esc(jpTime(data.analysis_date))} JST</span>
          </div>
        </div>
        <h1>株クラ朝刊</h1>
        <p class="subtitle">毎朝読むための一枚紙。今日の結論から、注視テーマ、本命候補、根拠源までを紙面順で整理します。</p>
        <div class="navline">一面 / 注視テーマ / 銘柄候補 / 根拠源 / 仮説源 / 背景源 / 0件日運用 / Markdown / JSON</div>
      `;
    }

    function buildFrontMain(data) {
      const mode = classifyMode(data);
      return `
        <p class="headline-note">Front Page</p>
        <h2>今日の結論</h2>
        <p class="lead">${esc(mode.lead)}</p>
        <div class="summary-box">
          <p><strong>主眼:</strong> ${esc(clip(mode.focus, 120))}</p>
          <p class="body" style="margin-top:8px;">${esc(clip(data.market_sentiment, 180))}</p>
        </div>
      `;
    }

    function buildFrontSide(data) {
      const investable = arr(data.investable_themes).length;
      const prime = arr(data.direct_picks).length + arr(data.associative_picks || data.stock_picks).length;
      const watch = arr(data.watch_candidates).length;
      const sourceTotal = collectSources(data).length;
      const checks = uniq(
        [...arr(data.next_checks), ...arr(data.next_check_guidance).flatMap((g) => arr(g.triggers))],
        (item) => norm(item)
      ).slice(0, 5);

      return `
        <div class="kpi-grid">
          <div class="kpi"><strong>注視テーマ</strong><span>${investable || arr(data.market_backdrop).length}</span></div>
          <div class="kpi"><strong>本命候補</strong><span>${prime}</span></div>
          <div class="kpi"><strong>監視候補</strong><span>${watch}</span></div>
          <div class="kpi"><strong>主要ソース</strong><span>${sourceTotal}</span></div>
        </div>
        <div class="note-grid" style="margin-top:18px;">
          <div class="note-card">
            <p class="section-kicker">Morning Checks</p>
            ${checks.length ? `<ul class="plain-list">${checks.map((item) => `<li>${esc(item)}</li>`).join("")}</ul>` : `<div class="small">朝の確認項目は未整理です。</div>`}
          </div>
        </div>
      `;
    }

    function buildThemeSection(data) {
      const investable = arr(data.investable_themes);
      const backdrop = arr(data.market_backdrop);
      const themes = investable.length ? investable : backdrop;
      const rows = themes.slice(0, 6).map((theme) => [
        `<strong>${esc(theme.theme)}</strong>`,
        investable.length ? "本命寄り" : "背景寄り",
        esc(arr(theme.beneficiary_processes).slice(0, 3).join(" / ") || "-"),
        esc(clip(arr(theme.news_items)[0]?.headline || theme.why_it_matters || "-", 90)),
      ]);

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Themes</p>
            <h3>注視テーマ一覧</h3>
            <p class="section-desc">新聞の中面のように、何を見る日なのかを最初に一覧化します。</p>
          </div>
          <div class="badge-row">
            <span class="badge navy">本命寄り ${investable.length}</span>
            <span class="badge green">背景寄り ${backdrop.length}</span>
          </div>
        </div>
        ${renderTable(["テーマ", "判断", "見る工程", "根拠の起点"], rows)}
      `;
    }

    function buildPickSection(data) {
      const direct = arr(data.direct_picks);
      const assoc = arr(data.associative_picks || data.stock_picks);
      const watch = arr(data.watch_candidates);
      const rows = [
        ...direct.map((pick) => ["本命", pick]),
        ...assoc.map((pick) => ["本命候補", pick]),
        ...watch.map((pick) => ["監視", pick]),
      ].slice(0, 8).map(([label, pick]) => [
        esc(label),
        `<strong>${esc(pick.name)} (${esc(pick.code)})</strong>`,
        esc(clip(pick.reasoning || pick.chain || "-", 110)),
        esc(clip(pick.catalyst || "-", 70)),
      ]);

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Candidates</p>
            <h3>本命候補 / 監視候補</h3>
            <p class="section-desc">候補銘柄は、理由と昇格条件がセットで読める形にします。</p>
          </div>
        </div>
        ${rows.length
          ? renderTable(["区分", "銘柄", "読み筋", "昇格条件"], rows)
          : '<div class="empty">今日は本命候補を無理に出さず、監視ボード側へ寄せています。</div>'}
      `;
    }

    function buildSourceSection(title, kicker, desc, items) {
      const rows = items.slice(0, 8).map((item) => [
        esc(item.theme || "-"),
        item.url ? `<a class="link" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">${esc(clip(item.headline, 76))}</a>` : esc(clip(item.headline, 76)),
        esc(sourceLabel(item.source)),
        `<span class="mono">${esc(item.timestamp ? jpTime(item.timestamp) : "-")}</span>`,
      ]);

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">${esc(kicker)}</p>
            <h3>${esc(title)}</h3>
            <p class="section-desc">${esc(desc)}</p>
          </div>
        </div>
        ${renderTable(["関連テーマ", "見出し", "ソース", "時刻"], rows)}
      `;
    }

    function buildHypothesisSection(data) {
      const hypothesis = collectSources(data).filter((item) => sourceKind(item) === "hypothesis");
      const rows = hypothesis.slice(0, 8).map((item) => [
        esc(item.theme || "-"),
        esc(clip(item.headline, 96)),
        esc(sourceLabel(item.source)),
        `<span class="mono">${esc(item.timestamp ? jpTime(item.timestamp) : "-")}</span>`,
      ]);

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Hypothesis Desk</p>
            <h3>仮説源</h3>
            <p class="section-desc">X や観測メモは別棚に分離し、単独では本命化しない扱いにします。</p>
          </div>
        </div>
        ${renderTable(["関連テーマ", "観測メモ", "ソース", "時刻"], rows)}
      `;
    }

    function buildZeroDaySection(data) {
      const sector = arr(data.sector_watch).map((item) => ({
        title: item.sector,
        body: item.why,
        points: arr(item.promotion_conditions),
        label: "注視業種",
      }));
      const process = arr(data.process_watch).map((item) => ({
        title: item.process,
        body: item.focus,
        points: arr(item.promotion_conditions),
        label: "注視工程",
      }));
      const boards = [...sector, ...process];

      if (!boards.length) {
        return `
          <div class="section-head">
            <div>
              <p class="section-kicker">Zero-Idea Desk</p>
              <h3>0件日運用</h3>
            </div>
          </div>
          <div class="empty">0件日ボードはありません。</div>
        `;
      }

      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Zero-Idea Desk</p>
            <h3>0件日でも残す紙面</h3>
            <p class="section-desc">ネタが薄い日でも、読むべき業種・工程・昇格条件は残します。</p>
          </div>
        </div>
        <div class="boards two-col">
          ${boards.slice(0, 6).map((item) => `
            <article class="board-card">
              <div class="badge-row">
                <span class="badge ${item.label === "注視業種" ? "green" : "red"}">${esc(item.label)}</span>
              </div>
              <h3 style="margin-top:10px;">${esc(item.title)}</h3>
              <p class="body" style="margin-top:10px;">${esc(clip(item.body, 130))}</p>
              ${item.points.length ? `<ul class="plain-list" style="margin-top:12px;">${item.points.slice(0, 3).map((point) => `<li>${esc(point)}</li>`).join("")}</ul>` : ""}
            </article>
          `).join("")}
        </div>
      `;
    }

    function buildFooter(data) {
      return `
        <div class="section-head">
          <div>
            <p class="section-kicker">Archive</p>
            <h3>公開ファイル</h3>
            <p class="section-desc">トップは紙面、詳細は Markdown と JSON に残します。</p>
          </div>
        </div>
        <div class="link-row">
          <a class="link" href="./latest-analysis-full.md">latest-analysis-full.md</a>
          <a class="link" href="./latest-analysis-full.json">latest-analysis-full.json</a>
        </div>
        <div class="footer-links small">最終更新: ${esc(jpTime(data.analysis_date))} / GitHub Pages 公開</div>
      `;
    }

    function render(data) {
      const allSources = collectSources(data);
      $("masthead").innerHTML = buildMasthead(data);
      $("front-main").innerHTML = buildFrontMain(data);
      $("front-side").innerHTML = buildFrontSide(data);
      $("theme-section").innerHTML = buildThemeSection(data);
      $("pick-section").innerHTML = buildPickSection(data);
      $("evidence-section").innerHTML = buildSourceSection(
        "根拠源",
        "Evidence Desk",
        "本命判断に使う一次寄りのソースです。Yahoo・株探・みんかぶを優先して並べます。",
        allSources.filter((item) => sourceKind(item) === "evidence")
      );
      $("hypothesis-section").innerHTML = buildHypothesisSection(data);
      $("background-section").innerHTML = buildSourceSection(
        "背景源",
        "Backdrop Desk",
        "為替・原油・金利・指数など、地合い判断に使うソースです。",
        allSources.filter((item) => sourceKind(item) === "background")
      );
      $("zero-day-section").innerHTML = buildZeroDaySection(data);
      $("footer-section").innerHTML = buildFooter(data);
    }

    function renderError(error) {
      const message = `<div class="error">latest-analysis-full.json の読み込みに失敗しました: ${esc(error.message)}</div>`;
      $("masthead").innerHTML = message;
      ["front-main", "front-side", "theme-section", "pick-section", "evidence-section", "hypothesis-section", "background-section", "zero-day-section", "footer-section"]
        .forEach((id) => { $(id).innerHTML = '<div class="empty">表示に必要なデータを読み込めませんでした。</div>'; });
    }

    fetch("./latest-analysis-full.json", { cache: "no-store" })
      .then((res) => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(render)
      .catch(renderError);
  </script>
</body>
</html>
