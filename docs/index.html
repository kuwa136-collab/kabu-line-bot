    function themeSvg(ts){if(!ts.length)return`<div class="empty">テーマがまだありません。</div>`;const max=Math.max(...ts.map(x=>x.mention),1),rows=ts.map((x,i)=>{const y=70+i*80,w=120+Math.round((x.mention/max)*310),c=i%2===0?"#983f3a":"#204262";return`<text x="40" y="${y-12}" font-size="14" font-weight="700" fill="#171c22" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">${e(clip(x.theme,20))}</text><rect x="40" y="${y}" width="620" height="18" rx="9" fill="rgba(23,28,34,.08)"/><rect x="40" y="${y}" width="${w}" height="18" rx="9" fill="${c}" opacity=".86"/><text x="${Math.min(40+w+16,700)}" y="${y+14}" font-size="12" fill="${c}" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">${e(`${x.mention}件`)}</text>`}).join("");return`<div class="figure"><svg viewBox="0 0 720 390" role="img" aria-label="テーマ強度バー"><rect x="1" y="1" width="718" height="388" rx="28" fill="rgba(255,252,247,.98)" stroke="rgba(23,28,34,.14)"/>${rows}</svg><p class="caption">テーマは強度バーだけにして、まず何が強いかだけを見せています。</p></div>`}
    function watchSvg(items){if(!items.length)return`<div class="empty">候補がまだありません。</div>`;const dots=items.map(x=>{const conf=Math.max(1,Math.min(5,+x.confidence||3)),px=118+(conf-1)*104,py=x.kind==="direct"?116:x.kind==="associate"?206:298,t=x.kind==="direct"?{c:"#983f3a",f:"rgba(152,63,58,.14)",r:34}:x.kind==="associate"?{c:"#9d7a44",f:"rgba(157,122,68,.16)",r:30}:{c:"#204262",f:"rgba(32,66,98,.12)",r:28};return`<circle cx="${px}" cy="${py}" r="${t.r}" fill="${t.f}" stroke="${t.c}" stroke-width="2"/>${svgText(px,py-4,x.code||x.name,{c:6,m:1,s:13,h:15})}${svgText(px,py+14,clip(x.name,7),{c:7,m:1,s:11,h:12,w:500})}`}).join("");return`<div class="figure"><svg viewBox="0 0 600 360" role="img" aria-label="候補ポジション"><rect x="1" y="1" width="598" height="358" rx="28" fill="rgba(255,252,247,.98)" stroke="rgba(23,28,34,.14)"/><line x1="86" y1="308" x2="542" y2="308" stroke="rgba(23,28,34,.24)" stroke-width="1.6"/><line x1="86" y1="66" x2="86" y2="308" stroke="rgba(23,28,34,.24)" stroke-width="1.6"/><text x="82" y="96" text-anchor="end" font-size="12" fill="#69737e" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">即反応</text><text x="82" y="206" text-anchor="end" font-size="12" fill="#69737e" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">中継ぎ</text><text x="82" y="300" text-anchor="end" font-size="12" fill="#69737e" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">先回り</text><text x="314" y="340" text-anchor="middle" font-size="12" fill="#69737e" font-family="BIZ UDPGothic, Yu Gothic, sans-serif">右ほど確度が高い</text>${dots}</svg><p class="caption">縦を時間軸、横を確度として置いています。</p></div>`}
    const sourceSvg=b=>`<div class="figure"><svg viewBox="0 0 600 360" role="img" aria-label="判断の層"><rect x="1" y="1" width="598" height="358" rx="28" fill="rgba(255,252,247,.98)" stroke="rgba(23,28,34,.14)"/><rect x="54" y="58" width="492" height="64" rx="28" fill="rgba(152,63,58,.12)" stroke="#983f3a"/><rect x="74" y="146" width="452" height="64" rx="28" fill="rgba(157,122,68,.14)" stroke="#9d7a44"/><rect x="94" y="234" width="412" height="64" rx="28" fill="rgba(32,66,98,.12)" stroke="#204262"/><text x="100" y="96" font-size="22" font-weight="800" fill="#983f3a" font-family="Shippori Mincho, serif">根拠源</text><text x="120" y="184" font-size="22" font-weight="800" fill="#9d7a44" font-family="Shippori Mincho, serif">背景源</text><text x="140" y="272" font-size="22" font-weight="800" fill="#204262" font-family="Shippori Mincho, serif">仮説源</text>${svgText(434,92,b.evidence[0]?clip(b.evidence[0].headline,18):"主要記事なし",{c:14,m:2,s:13,h:15})}${svgText(414,180,b.background[0]?clip(b.background[0].headline,18):"地合い整理中",{c:14,m:2,s:13,h:15})}${svgText(394,268,b.hypothesis[0]?clip(b.hypothesis[0].headline,18):"仮説整理中",{c:14,m:2,s:13,h:15})}</svg><p class="caption">上ほど判断の土台、下ほど軽い仮説です。</p></div>`;
    const zeroSvg=b=>{const sectors=b.sectors.slice(0,2).join(" / ")||"業種整理中",processes=b.processes.slice(0,2).join(" / ")||"工程整理中",checks=b.checks.slice(0,2).join(" / ")||"次チェック整理中";return`<div class="figure"><svg viewBox="0 0 600 320" role="img" aria-label="0件日の流れ"><rect x="1" y="1" width="598" height="318" rx="28" fill="rgba(255,252,247,.98)" stroke="rgba(23,28,34,.14)"/><rect x="34" y="92" width="160" height="120" rx="28" fill="rgba(152,63,58,.1)" stroke="#983f3a"/><rect x="220" y="92" width="160" height="120" rx="28" fill="rgba(157,122,68,.14)" stroke="#9d7a44"/><rect x="406" y="92" width="160" height="120" rx="28" fill="rgba(32,66,98,.1)" stroke="#204262"/><text x="114" y="124" text-anchor="middle" font-size="20" font-weight="800" fill="#983f3a" font-family="Shippori Mincho, serif">注視業種</text><text x="300" y="124" text-anchor="middle" font-size="20" font-weight="800" fill="#9d7a44" font-family="Shippori Mincho, serif">注視工程</text><text x="486" y="124" text-anchor="middle" font-size="20" font-weight="800" fill="#204262" font-family="Shippori Mincho, serif">昇格条件</text>${svgText(114,154,sectors,{c:10,m:3,s:13,h:15})}${svgText(300,154,processes,{c:10,m:3,s:13,h:15})}${svgText(486,154,checks,{c:10,m:3,s:13,h:15})}<path d="M194 152 C206 152, 212 152, 220 152" fill="none" stroke="#9d7a44" stroke-width="3.2" stroke-linecap="round"/><path d="M380 152 C392 152, 398 152, 406 152" fill="none" stroke="#204262" stroke-width="3.2" stroke-linecap="round"/></svg><p class="caption">0件日は、業種 → 工程 → 昇格条件の順にだけ見ます。</p></div>`};
    const storyCard=(x,i,f=false)=>`<article class="story ${f?"featured":""}"><div class="metaRow">${chip(`#${i+1}`,"red")}${chip(label(x.source),i%2===0?"red":"navy")}${chip(cat(x),x.role==="hypothesis"?"navy":"gold")}${x.timestamp?chip(jp(x.timestamp)):""}</div>${storySvg(x,i,f)}<h3 class="storyTitle">${x.url?`<a href="${e(x.url)}" target="_blank" rel="noopener noreferrer">${e(x.headline)}</a>`:e(x.headline)}</h3><p class="body">${e(clip(x.summary||x.why||"要点整理中です。",f?110:84))}</p><div class="flow">${chip(label(x.source),"red")}<span>→</span>${chip(clip(x.theme||cat(x),16),"navy")}<span>→</span>${chip(action(x),"green")}</div></article>`;
    const themeRow=(x,i,max)=>`<article class="themeRow"><div class="metaRow">${chip(`Theme ${i+1}`,i%2===0?"red":"navy")}${chip(`${x.mention}件`)}</div><h3 class="sectionTitle">${e(x.theme)}</h3><p class="body">${e(clip(x.why||"要点整理中です。",86))}</p><div class="themeBar"><span style="width:${Math.max(14,Math.round((x.mention/max)*100))}%"></span></div></article>`;
    const watchCard=x=>`<article class="watchCard"><div class="metaRow">${chip(x.kind==="direct"?"本命":x.kind==="associate"?"中継ぎ":"監視",x.kind==="direct"?"red":x.kind==="associate"?"gold":"navy")}${chip(x.code||"code")}${chip(`確度 ${x.confidence||0}`)}</div><strong>${e(x.name)}</strong><p class="body">${e(clip(x.reason||x.chain||"つながり整理中です。",78))}</p>${x.catalyst?`<p class="small">昇格条件: ${e(clip(x.catalyst,52))}</p>`:""}${x.risk?`<p class="small">弱さ: ${e(clip(x.risk,46))}</p>`:""}<div class="watchBar"><span style="width:${Math.max(12,Math.min(100,(+x.confidence||0)*20))}%"></span></div></article>`;
    const sourceBox=(title,sub,items,tone)=>`<section class="sourceBox ${tone}"><div class="sourceHead"><div><p class="eyebrow">${e(sub)}</p><h3 class="sectionTitle">${e(title)}</h3></div><div class="count">${e(items.length)}</div></div><div class="sourceStack">${items.length?items.slice(0,2).map(x=>`<article class="sourceItem"><div class="metaRow">${chip(label(x.source),tone)}${x.timestamp?chip(jp(x.timestamp)):""}</div><strong>${x.url?`<a href="${e(x.url)}" target="_blank" rel="noopener noreferrer">${e(clip(x.headline,42))}</a>`:e(clip(x.headline,42))}</strong><p class="small">${e(clip(x.summary||x.theme||"整理中です。",76))}</p></article>`).join(""):`<div class="empty">まだ並べる情報がありません。</div>`}</div></section>`;
    const toolbar=(d,c)=>`<div class="toolbar"><div class="brand"><p class="eyebrow">GitHub Pages Morning Edition</p><h1>株クラ朝刊 Slides</h1><p>図で先に理解して、その後に本文を読む構成に寄せています。</p></div><div class="toolbarMeta"><span class="meta">${e(full(d.analysis_date))} JST</span><span class="meta">ニュース ${e(c.news.length)} 件</span><span class="meta">テーマ ${e(c.themes.length)} 件</span><a class="link" href="./latest-analysis-full.md" target="_blank" rel="noopener noreferrer">Markdown</a><a class="link" href="./latest-analysis-full.json" target="_blank" rel="noopener noreferrer">JSON</a></div></div>`;
    function render(data){const c=ctx(data),t=c.themes[0],lead=c.news[0],news=c.news.slice(0,3),max=Math.max(...c.themes.map(x=>x.mention),1);$("masthead").innerHTML=toolbar(data,c);$("deck").innerHTML=[`<section class="slide">${head("01","Front Page","今日の結論","一枚目は、朝の読み筋をひと目で掴むための面です。")}<div class="heroGrid"><section class="card alert"><p class="eyebrow">Morning Thesis</p><h3 class="heroTitle">${e(t?t.theme:"材料整理中")}</h3><p class="heroCopy">${e(clip((lead&&`${lead.headline}。${lead.summary||lead.why}`)||data.market_sentiment||(t&&t.why)||"ニュースの要点を整理中です。",126))}</p><div class="metaRow">${t?chip(t.theme,"red"):""}${lead?chip(label(lead.source),"navy"):""}${c.watch[0]?chip(`${c.watch[0].code} ${c.watch[0].name}`,"green"):""}${c.boards.checks[0]?chip(clip(c.boards.checks[0],18),"gold"):""}</div><div class="statGrid"><article class="stat"><span>主役テーマ</span><strong>${e(c.themes.length)}</strong></article><article class="stat"><span>監視候補</span><strong>${e(c.watch.length)}</strong></article><article class="stat"><span>確認トリガー</span><strong>${e(c.boards.checks.length)}</strong></article></div><div class="memo"><p class="eyebrow">Why It Matters</p><strong>${e(lead?clip(lead.headline,34):"材料整理中")}</strong><p class="body">${e(clip((t&&t.why)||(lead&&lead.summary)||"朝の一言メモを整理中です。",88))}</p></div></section><div>${heroSvg(t,lead,c.boards,c.watch)}</div></div></section>`,`<section class="slide">${head("02","News Storyboard","主要ニュース","上から順に読むだけで論点が入るようにしています。")}${news.length?`<div class="newsGrid"><div>${storyCard(news[0],0,true)}</div><div class="storyStack">${news.slice(1).map((x,i)=>storyCard(x,i+1)).join("")}</div></div>`:`<div class="empty">表示できるニュースがありません。</div>`}</section>`,`<section class="slide">${head("03","Theme Atlas","今日の市場地図","テーマは4本以内に絞り、強度と短い解説だけにしています。")}<div class="twoCol"><div>${themeSvg(c.themes)}</div><div class="themeList">${c.themes.length?c.themes.map((x,i)=>themeRow(x,i,max)).join(""):`<div class="empty">テーマがまだありません。</div>`}</div></div></section>`,`<section class="slide">${head("04","Watch Board","本命候補 / 監視候補","候補は位置づけを先に図で見せて、右で短く補足します。")}<div class="watchGrid"><div>${watchSvg(c.watch)}</div><div class="stack">${c.watch.length?c.watch.map(watchCard).join(""):`<div class="empty">候補がまだありません。</div>`}</div></div></section>`,`<section class="slide">${head("05","Source Layers","根拠源と0件日ボード","最後の面は、判断の重さと、材料が薄い日に何を見るかだけに絞っています。")}<div class="lastGrid"><div class="stack">${sourceSvg(c.buckets)}${zeroSvg(c.boards)}</div><div class="stack">${sourceBox("根拠源","Primary",c.buckets.evidence,"red")}${sourceBox("背景源","Backdrop",c.buckets.background,"gold")}${sourceBox("仮説源","Hypothesis",c.buckets.hypothesis,"navy")}<section class="sourceBox"><p class="eyebrow">Quick Links</p><h3 class="sectionTitle">元データ</h3><p class="small">必要なときだけ Markdown と JSON を開けるようにしています。</p><div class="footerLinks"><a class="link" href="./latest-analysis-full.md" target="_blank" rel="noopener noreferrer">Markdown を開く</a><a class="link" href="./latest-analysis-full.json" target="_blank" rel="noopener noreferrer">JSON を開く</a></div></section></div></div></section>`].join("");$("footer").innerHTML=`最終更新: ${e(full(data.analysis_date))} JST / 公開ファイル: latest-analysis-full.md / latest-analysis-full.json`}
    fetch("./latest-analysis-full.json",{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}).then(render).catch(err=>{$("masthead").innerHTML="";$("deck").innerHTML=`<div class="error">latest-analysis-full.json の読み込みに失敗しました: ${e(err.message)}</div>`;$("footer").innerHTML=""});
  </script>
